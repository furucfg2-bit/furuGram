<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* (весь CSS из предыдущей версии) */
        :root {
            --bg: #ffffff; --surface: #ffffff; --surface2: #f0f2f5; --surface3: #e4e6eb;
            --chat-bg: #ffffff; --accent: #3390ec; --premium: #d4a843; --text: #000000;
            --text-secondary: #707579; --text-muted: #8d9298; --border: #e0e0e0;
            --hover: #f0f2f5; --bubble-out: #f0f2f5; --bubble-in: #3390ec;
            --online: #4caf50; --danger: #e53935; --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        .dark {
            --bg: #18222e; --surface: #1c2838; --surface2: #212e3e; --surface3: #263444;
            --chat-bg: #18222e; --accent: #5b8cce; --text: #e9e9e9;
            --text-secondary: #8a9bb0; --text-muted: #5e6e80; --border: #253040;
            --hover: #212e3e; --bubble-out: #212e3e; --bubble-in: #2b5278;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg); display:flex; justify-content:center; align-items:center;
            height:100vh; height:100dvh; color:var(--text); overflow:hidden;
            user-select:none; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;
        }
        .app { width:100%; max-width:1100px; height:100vh; height:100dvh; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }
        @media(min-width:769px){.app{height:94vh;border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,0.06);}}

        .header { height:56px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .header-title { font-size:1.2rem; font-weight:600; color:var(--text); }
        .hbtn { width:36px; height:36px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .hbtn:active { background:var(--hover); }

        .content { flex-grow:1; display:flex; overflow:hidden; position:relative; }
        .sidebar { width:100%; background:var(--surface); display:flex; flex-direction:column; position:absolute; inset:0; z-index:5; }
        @media(min-width:769px){.sidebar{width:340px;min-width:340px;max-width:340px;position:relative;border-right:1px solid var(--border);}}
        .sidebar.hide{transform:translateX(-100%);} @media(min-width:769px){.sidebar.hide{transform:none;}}

        .search-box { margin:8px 12px; position:relative; }
        .search-box input { width:100%; padding:10px 10px 10px 38px; background:var(--surface2); border:1px solid transparent; border-radius:22px; color:var(--text); font-size:0.9rem; outline:none; }
        .search-box i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); }

        .chat-list { flex-grow:1; overflow-y:auto; }
        .chat-item { display:flex; align-items:center; gap:12px; padding:10px 14px; cursor:pointer; }
        .chat-item:active { background:var(--hover); }
        .avatar { width:48px; height:48px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.2rem; color:white; flex-shrink:0; overflow:hidden; position:relative; background-size:cover; background-position:center; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .avatar.sm { width:38px; height:38px; font-size:0.9rem; }
        .avatar.lg { width:80px; height:80px; font-size:2rem; }
        .avatar.pr { border:2px solid var(--premium); box-shadow:0 0 12px rgba(212,168,67,0.3); }
        .online-dot { position:absolute; bottom:1px; right:1px; width:11px; height:11px; background:var(--online); border-radius:50%; border:2px solid var(--surface); }
        .cbody { flex-grow:1; min-width:0; }
        .cname { font-weight:500; font-size:0.95rem; }
        .cpreview { font-size:0.82rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

        .chat-area { flex-grow:1; display:flex; flex-direction:column; background:var(--chat-bg); }
        .chat-head { height:56px; padding:0 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--surface); }
        .back-btn { width:34px; height:34px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer; display:none; align-items:center; justify-content:center; }
        @media(max-width:768px){.back-btn{display:flex;}}
        .msgs { flex-grow:1; padding:12px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
        .msg { display:flex; max-width:75%; }
        .msg.out { align-self:flex-end; }
        .mbub { padding:8px 12px; border-radius:16px; font-size:0.93rem; line-height:1.4; word-break:break-word; }
        .msg.in .mbub { background:var(--bubble-out); border-bottom-left-radius:4px; }
        .msg.out .mbub { background:var(--bubble-in); color:white; border-bottom-right-radius:4px; }
        .mtime { font-size:0.62rem; opacity:0.6; text-align:right; margin-top:3px; }
        .dsep { text-align:center; margin:8px 0; font-size:0.72rem; color:var(--text-muted); }
        .dsep span { background:var(--chat-bg); padding:3px 12px; border-radius:10px; border:1px solid var(--border); }

        .input-row { padding:8px 12px; padding-bottom:calc(8px + var(--safe-bottom)); border-top:1px solid var(--border); display:flex; align-items:center; gap:6px; background:var(--surface); }
        .input-row input { flex-grow:1; padding:9px 14px; background:var(--surface2); border:1px solid transparent; border-radius:22px; color:var(--text); font-size:0.92rem; outline:none; }
        .send-btn { width:38px; height:38px; border-radius:50%; background:var(--accent); border:none; color:white; font-size:0.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

        .empty { flex-grow:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--text-secondary); gap:8px; }
        .page { position:absolute; inset:0; background:var(--bg); z-index:6; overflow-y:auto; display:none; }
        .page.show { display:block; }

        .prof-cover { height:120px; background:linear-gradient(135deg,var(--accent),#6ab0f3); position:relative; }
        .prof-av-wrap { position:relative; margin-top:-40px; margin-left:20px; z-index:10; }
        .prof-av-lg { width:80px; height:80px; border-radius:50%; background:var(--accent); border:4px solid var(--surface); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; color:white; overflow:hidden; cursor:pointer; background-size:cover; background-position:center; }
        .prof-av-lg img { width:100%; height:100%; object-fit:cover; }
        .prof-info { padding:12px 20px; }
        .prof-name-lg { font-size:1.3rem; font-weight:600; display:flex; align-items:center; gap:6px; }
        .prof-uname-lg { color:var(--text-secondary); font-size:0.9rem; }
        .prof-stats-row { display:flex; gap:24px; margin-top:14px; }
        .pstat { text-align:center; }
        .pstat-num { font-weight:600; font-size:1.15rem; }
        .pstat-lbl { font-size:0.72rem; color:var(--text-muted); }
        .gifts-row { display:flex; gap:8px; padding:4px 20px 12px; flex-wrap:wrap; }
        .gift-item { background:var(--surface2); border-radius:12px; padding:8px 12px; font-size:1.5rem; }

        .psec { margin:10px 0; background:var(--surface); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
        .psec-title { padding:14px 20px 8px; font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; }
        .pitem { display:flex; align-items:center; padding:16px 20px; cursor:pointer; color:var(--text); font-size:0.95rem; gap:16px; border-bottom:1px solid var(--border); }
        .pitem:last-child { border-bottom:none; }
        .pitem:active { background:var(--hover); }
        .pitem i { width:24px; text-align:center; font-size:1.05rem; color:var(--text-secondary); }
        .pitem .pv { color:var(--text-secondary); font-size:0.88rem; margin-left:auto; }
        .pitem.danger { color:var(--danger); }

        .sitem { display:flex; align-items:center; padding:16px 20px; cursor:pointer; color:var(--text); font-size:0.95rem; gap:16px; border-bottom:1px solid var(--border); }
        .sitem:active { background:var(--hover); }
        .sitem i { width:24px; text-align:center; font-size:1.05rem; color:var(--text-secondary); }
        .sitem .sv { color:var(--text-muted); font-size:0.88rem; margin-left:auto; }

        .nav { height:56px; display:flex; background:var(--surface); border-top:1px solid var(--border); padding-bottom:var(--safe-bottom); }
        .ni { flex:1; display:flex; flex-direction:column; align-items:center; padding:6px 0; cursor:pointer; color:var(--text-secondary); border:none; background:transparent; font-size:0.6rem; gap:3px; }
        .ni i { font-size:1.3rem; }
        .ni.active { color:var(--accent); }

        .login-screen { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px 24px; width:100%; max-width:380px; }
        .field { margin-bottom:14px; }
        .field label { display:block; font-size:0.82rem; color:var(--text-secondary); margin-bottom:6px; }
        .field input { width:100%; padding:13px 14px; background:var(--surface2); border:2px solid transparent; border-radius:12px; color:var(--text); font-size:0.95rem; outline:none; }
        .field input:focus { border-color:var(--accent); }
        .btn { width:100%; padding:14px; border:none; border-radius:12px; font-weight:600; font-size:0.95rem; cursor:pointer; margin-top:8px; }
        .btn:active { transform:scale(0.97); }
        .btn-p { background:var(--accent); color:white; }
        .btn-o { background:transparent; color:var(--accent); }
        .err { color:var(--danger); font-size:0.8rem; text-align:center; margin-top:8px; display:none; }
        .err.show { display:block; }
        .ok { color:#4caf50; font-size:0.8rem; text-align:center; margin-top:8px; display:none; }
        .ok.show { display:block; }

        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--surface3); color:var(--text); padding:10px 20px; border-radius:24px; font-size:0.85rem; z-index:250; pointer-events:none; border:1px solid var(--border); animation:tIn 0.3s,tOut 0.3s 2.5s forwards; white-space:nowrap; }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes tOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-10px);} }

        .prem-overlay { position:fixed; inset:0; z-index:300; pointer-events:none; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); }
        .prem-anim { text-align:center; animation:premBoom 2s ease-out forwards; }
        .prem-anim .st { font-size:6rem; animation:starSpin 0.5s ease-in-out 4; }
        .prem-anim .tx { font-size:1.8rem; font-weight:700; color:#f0c860; margin-top:12px; }
        @keyframes premBoom { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.2);opacity:1} 100%{transform:scale(2);opacity:0} }
        @keyframes starSpin { 0%,100%{transform:rotate(0)scale(1)} 50%{transform:rotate(180deg)scale(1.6)} }

        .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:400; display:flex; align-items:flex-end; justify-content:center; }
        .modal-card { background:var(--surface); border-radius:16px 16px 0 0; padding:24px 20px; width:100%; max-width:500px; max-height:75vh; overflow-y:auto; }
        .modal-card h3 { text-align:center; font-size:1.15rem; font-weight:600; color:var(--text); margin-bottom:16px; }
    </style>
</head>
<body class="light">

<div class="app" id="app">
    <div class="header"><div class="header-title" id="ht">FuruGram</div><div class="header-actions"><button class="hbtn" onclick="window.showCreate()"><i class="fas fa-plus"></i></button><button class="hbtn" onclick="window.showPrem()" style="color:var(--premium);"><i class="fas fa-star"></i></button></div></div>
    <div class="content">
        <div class="sidebar" id="sidebar"><div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Поиск..." id="searchInput"></div><div class="chat-list" id="chatList"></div></div>
        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState"><i class="fas fa-comments" style="font-size:3.5rem;opacity:0.12;"></i><h3>FuruGram</h3><p id="emptyText">Выберите чат</p></div>
            <div class="chat-head" id="chatHead" style="display:none;"><button class="back-btn" onclick="window.closeChat()"><i class="fas fa-arrow-left"></i></button><div class="avatar sm" id="chatAv">A</div><div><div class="cname" id="chatNm"></div><div style="font-size:0.75rem;color:var(--text-secondary);" id="chatSt"></div></div></div>
            <div class="msgs" id="messages" style="display:none;"></div>
            <div class="input-row" id="inputRow" style="display:none;"><input type="text" placeholder="Сообщение..." id="msgInput"><button class="send-btn" onclick="window.sendMsg()"><i class="fas fa-paper-plane"></i></button></div>
        </div>
        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>
    <div class="nav">
        <button class="ni active" data-p="chats" onclick="window.go('chats')"><i class="fas fa-comments"></i><span id="navChats">Чаты</span></button>
        <button class="ni" data-p="contacts" onclick="window.go('contacts')"><i class="fas fa-address-book"></i><span id="navContacts">Контакты</span></button>
        <button class="ni" data-p="settings" onclick="window.go('settings')"><i class="fas fa-cog"></i><span id="navSettings">Настройки</span></button>
        <button class="ni" data-p="profile" onclick="window.go('profile')"><i class="fas fa-user"></i><span id="navProfile">Профиль</span></button>
    </div>
</div>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2 style="text-align:center;font-size:1.5rem;margin-bottom:4px;">🔐 FuruGram</h2>
        <p style="text-align:center;color:var(--text-secondary);margin-bottom:20px;" id="loginSub">Войдите в аккаунт</p>
        <div class="field"><label>Email</label><input type="email" id="lemail" placeholder="your@email.com"></div>
        <div class="field" id="nameField" style="display:none;"><label id="lblName">Имя</label><input type="text" id="lname" placeholder="Ваше имя"></div>
        <div class="field"><label id="lblPass">Пароль</label><input type="password" id="lpass" placeholder="••••••"></div>
        <div class="err" id="lerr"></div><div class="ok" id="lok"></div>
        <button class="btn btn-p" id="loginBtn" onclick="window.handleAuth()">🚀 Войти</button>
        <button class="btn btn-o" id="switchBtn" onclick="window.toggleMode()">✨ Создать аккаунт</button>
        <button class="btn btn-o" onclick="window.switchLang()" style="font-size:0.85rem;">🌐 English</button>
    </div>
</div>

<div id="createModal" style="display:none;" class="modal-bg"><div class="modal-card"><h3 id="createTitle">✨ Создать</h3><div class="field"><label id="lblCreateName">Название</label><input type="text" id="cname"></div><button class="btn btn-p" onclick="window.doCreate('channel')" style="width:100%;">📢 <span id="btnChannel">Канал</span></button><button class="btn" onclick="window.doCreate('group')" style="width:100%;background:#4caf50;color:white;margin-top:8px;">👥 <span id="btnGroup">Группа</span></button><button class="btn btn-o" onclick="window.hideCreate()" style="width:100%;"><span id="btnCancel">Отмена</span></button></div></div>

<div id="premModal" style="display:none;" class="modal-bg"><div class="modal-card"><h3>⭐ FuruGram Premium</h3><p style="text-align:center;color:var(--text-secondary);margin-bottom:16px;" id="premDesc">Эксклюзивные возможности</p><button class="btn" id="actPremBtn" onclick="window.activatePrem()" style="width:100%;background:linear-gradient(135deg,#d4a843,#f0c860);color:#1a1a2e;font-weight:700;font-size:1rem;padding:15px;">⭐ <span id="btnActivate">Активировать бесплатно</span></button><button class="btn" id="cancelPremBtn" onclick="window.cancelPrem()" style="width:100%;background:var(--danger);color:white;display:none;margin-top:8px;"><span id="btnCancelPrem">Отменить Premium</span></button><button class="btn btn-o" onclick="window.hidePrem()" style="width:100%;"><span id="btnClose">Закрыть</span></button></div></div>

<div id="giftShopModal" style="display:none;" class="modal-bg"><div class="modal-card"><h3>🎁 <span id="giftTitle">Магазин подарков</span></h3><p style="text-align:center;color:var(--text-secondary);margin-bottom:14px;"><span id="giftStarsLabel">Ваши звёзды:</span> <b id="starsCount">0</b> ⭐</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="giftList"></div><button class="btn btn-o" onclick="window.hideGiftShop()" style="width:100%;margin-top:14px;"><span id="btnCloseGift">Закрыть</span></button></div></div>

<input type="file" id="avatarInput" accept="image/*" style="display:none;">

    function sd(v){try{localStorage.setItem(DB,JSON.stringify(v));return true;}catch(e){return false;}}
    function gc(){try{return JSON.parse(localStorage.getItem(CH)||'{}');}catch(e){return{};}}
    function sc(v){try{localStorage.setItem(CH,JSON.stringify(v));}catch(e){return false;}}
    function gg(){try{return JSON.parse(localStorage.getItem(GR)||'{}');}catch(e){return{};}}
    function sg(v){try{localStorage.setItem(GR,JSON.stringify(v));}catch(e){return false;}}
    function gs(){try{return JSON.parse(localStorage.getItem(SS)||'null');}catch(e){return null;}}
    function ss(v){try{localStorage.setItem(SS,JSON.stringify(v));return true;}catch(e){return false;}}

    let U=null,active=null,page='chats',isReg=false;
    const gifts=[{e:'🧸',n:'Мишка',p:15},{e:'💝',n:'Сердце',p:15},{e:'🌹',n:'Роза',p:25},{e:'🎁',n:'Подарочек',p:25},{e:'💎',n:'Алмаз',p:50},{e:'👑',n:'Корона',p:100}];

    function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}
    function premAnim(){const o=document.createElement('div');o.className='prem-overlay';o.innerHTML='<div class="prem-anim"><div class="st">⭐</div><div class="tx">Premium!</div></div>';document.body.appendChild(o);setTimeout(()=>o.remove(),2200);}
    function gid(){return'id'+Date.now()+Math.random().toString(36).substr(2,6);}
    function md(){if(!U)return{contacts:[],messages:{},channels:[],groups:[]};const d=gd();return d[U.id]||{contacts:[],messages:{},channels:[],groups:[]};}
    function smd(v){const d=gd();d[U.id]=v;sd(d);}
    function addContact(cid){const d=md();if(!d.contacts)d.contacts=[];if(!d.contacts.includes(cid)){d.contacts.push(cid);if(!d.messages)d.messages={};if(!d.messages[cid])d.messages[cid]=[];smd(d);return true;}return false;}

    // ===== ГЛОБАЛЬНЫЕ ФУНКЦИИ =====
    window.switchLang = function(){LANG=LANG==='ru'?'en':'ru';updateAllTexts();localStorage.setItem('fg_lang',LANG);};
    window.toggleMode = function(){isReg=!isReg;updateAllTexts();document.getElementById('nameField').style.display=isReg?'block':'none';};
    window.handleAuth = function(){
        const email=document.getElementById('lemail').value.trim().toLowerCase();
        const pass=document.getElementById('lpass').value.trim();
        const name=document.getElementById('lname').value.trim();
        const err=document.getElementById('lerr'), ok=document.getElementById('lok');
        err.classList.remove('show'); ok.classList.remove('show');
        if(!email||!pass){err.textContent='❌ '+t('fillFields');err.classList.add('show');return;}
        if(!email.includes('@')){err.textContent='❌ '+t('invalidEmail');err.classList.add('show');return;}
        if(pass.length<3){err.textContent='❌ '+t('shortPass');err.classList.add('show');return;}
        if(isReg&&!name){err.textContent='❌ '+t('enterName');err.classList.add('show');return;}
        const users=gu();
        if(isReg){
            if(users[email]){err.textContent='❌ '+t('emailExists');err.classList.add('show');return;}
            let uname=email.split('@')[0].replace(/[^a-z0-9_]/g,'_');
            while(uname.length<5)uname+='_'+Math.random().toString(36).substr(2,3);
            users[email]={id:email,name,username:uname,password:pass,avatar:'',online:true,premium:false,bio:'',stars:100,gifts:[]};
            if(!su(users)){err.textContent='❌ '+t('saveError');err.classList.add('show');return;}
            U=users[email]; ss(U);
            ok.textContent='✅ @'+uname; ok.classList.add('show');
            setTimeout(()=>{document.getElementById('loginScreen').style.display='none';go('chats');toast('🎉 '+t('welcome'));},800);
        }else{
            const u=users[email];
            if(!u){err.textContent='❌ '+t('emailExists');err.classList.add('show');return;}
            if(u.password!==pass){err.textContent='❌ '+t('shortPass');err.classList.add('show');return;}
            U=u; U.online=true; su(users); ss(U);
            ok.textContent='✅ OK'; ok.classList.add('show');
            setTimeout(()=>{document.getElementById('loginScreen').style.display='none';go('chats');toast('👋 '+t('welcomeBack'));},400);
        }
    };

    window.go = function(p){
        page=p;
        document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
        const ni=document.querySelector(`[data-p="${p}"]`);
        if(ni)ni.classList.add('active');
        document.getElementById('sidebar').classList.toggle('hide',p!=='chats');
        document.getElementById('contactsPage').classList.toggle('show',p==='contacts');
        document.getElementById('profilePage').classList.toggle('show',p==='profile');
        document.getElementById('settingsPage').classList.toggle('show',p==='settings');
        if(p==='chats')rc();
        if(p==='contacts')rco();
        if(p==='profile')rp();
        if(p==='settings')rs();
        document.getElementById('ht').textContent=p==='chats'?'FuruGram':t(p);
        updateAllTexts();
    };

    window.showCreate = ()=>document.getElementById('createModal').style.display='flex';
    window.hideCreate = ()=>document.getElementById('createModal').style.display='none';
    window.doCreate = function(type){
        const n=document.getElementById('cname').value.trim();
        if(!n){toast(t('enterName'));return;}
        const nid=gid(), d=md();
        if(type==='channel'){
            const chs=gc(); chs[nid]={id:nid,name:n,desc:'',creatorId:U.id,subscribers:1}; sc(chs);
            if(!d.channels)d.channels=[]; d.channels.push(nid);
            toast('📢 '+t('channelCreated'));
        }else{
            const grs=gg(); grs[nid]={id:nid,name:n,desc:'',creatorId:U.id,members:1}; sg(grs);
            if(!d.groups)d.groups=[]; d.groups.push(nid);
            toast('👥 '+t('groupCreated'));
        }
        if(!d.messages)d.messages={}; d.messages[nid]=[]; smd(d);
        hideCreate(); rc(); // обновить список чатов
    };

    window.showPrem = ()=>{if(!U)return; document.getElementById('premModal').style.display='flex'; updatePremBtns();};
    window.hidePrem = ()=>document.getElementById('premModal').style.display='none';
    window.activatePrem = ()=>{if(!U)return; const users=gu(); users[U.id].premium=true; su(users); U.premium=true; hidePrem(); premAnim(); rp(); toast('⭐ '+t('premActivated'));};
    window.cancelPrem = ()=>{if(!U)return; if(confirm(t('cancelPrem')+'?')){const users=gu(); users[U.id].premium=false; su(users); U.premium=false; hidePrem(); rp(); toast(t('premCancelled'));}};
    function updatePremBtns(){document.getElementById('actPremBtn').style.display=U.premium?'none':'block'; document.getElementById('cancelPremBtn').style.display=U.premium?'block':'none';}

    window.showGiftShop = ()=>{
        if(!U)return;
        document.getElementById('giftShopModal').style.display='flex';
        document.getElementById('starsCount').textContent=U.stars||0;
        const gl=document.getElementById('giftList'); gl.innerHTML='';
        gifts.forEach(g=>{
            const div=document.createElement('div');
            div.style.cssText='background:var(--surface2);border-radius:14px;padding:16px;text-align:center;cursor:pointer;';
            div.innerHTML=`<div style="font-size:2.2rem;">${g.e}</div><div style="font-weight:600;">${g.n}</div><div style="color:var(--premium);">${g.p} ⭐</div>`;
            div.onclick=()=>buyGift(g.e,g.p);
            gl.appendChild(div);
        });
    };
    window.hideGiftShop = ()=>document.getElementById('giftShopModal').style.display='none';
    function buyGift(emoji,price){
        if(!U)return;
        if((U.stars||0)<price){toast('❌ '+t('notEnoughStars'));return;}
        U.stars-=price; if(!U.gifts)U.gifts=[]; U.gifts.push(emoji);
        const users=gu(); users[U.id].stars=U.stars; users[U.id].gifts=[...U.gifts]; su(users);
        rp(); showGiftShop(); toast('✅ '+t('giftBought'));
    }

    window.sendMsg = function(){
        const text=document.getElementById('msgInput').value.trim();
        if(!text||!active||!U)return;
        const d=md(); if(!d.messages)d.messages={}; if(!d.messages[active])d.messages[active]=[];
        const now=new Date(); const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
        const msg={text,time,out:true,read:true,sender:U.name};
        d.messages[active].push(msg); smd(d);
        document.getElementById('msgInput').value='';
        renderMsgs(); rc();
        BC.postMessage({type:'msg',from:U.id,to:active,msg,chatType:'personal'});
    };
    window.closeChat = function(){
        active=null;
        document.getElementById('emptyState').style.display='flex';
        document.getElementById('chatHead').style.display='none';
        document.getElementById('messages').style.display='none';
        document.getElementById('inputRow').style.display='none';
        document.getElementById('sidebar').classList.remove('hide');
    };

    window.toggleTheme = function(){
        const dm=document.body.classList.toggle('dark');
        document.getElementById('themeLabel').textContent=dm?t('dark'):t('light');
        localStorage.setItem('fg_theme',dm?'dark':'light');
    };
    window.requestNotification = function(){
        if('Notification' in window){
            Notification.requestPermission().then(p=>{
                if(p==='granted'){toast('✅ ON'); new Notification('FuruGram',{body:'Notifications ON!'});}
                else{toast('❌ OFF');}
            });
        }
    };

    window.editF = function(field){
        const labels={name:t('name'),username:t('username'),bio:t('bio')};
        const values={name:U.name,username:U.username,bio:U.bio||''};
        const nv=prompt(labels[field]+':',values[field]);
        if(!nv||!nv.trim())return;
        const trimmed=nv.trim();
        const users=gu();
        if(field==='name'){U.name=trimmed; users[U.id].name=trimmed; toast(t('nameUpdated'));}
        else if(field==='username'){
            if(trimmed.length<5||trimmed.length>15){toast('5-15 chars');return;}
            if(!/^[a-z0-9_]+$/.test(trimmed)){toast('a-z, 0-9, _');return;}
            U.username=trimmed; users[U.id].username=trimmed; toast(t('usernameUpdated'));
        }else if(field==='bio'){U.bio=trimmed; users[U.id].bio=trimmed; toast(t('bioUpdated'));}
        su(users); rp();
    };
    window.logout = function(){
        U=null; active=null; ss(null);
        document.getElementById('loginScreen').style.display='flex';
        document.getElementById('lemail').value=''; document.getElementById('lpass').value='';
        go('chats');
    };

    // ===== ВНУТРЕННИЕ ФУНКЦИИ =====
    function updateAllTexts(){
        document.getElementById('loginSub').textContent=t('signIn');
        document.getElementById('loginBtn').textContent='🚀 '+t('signInBtn');
        document.getElementById('switchBtn').textContent=isReg?t('haveAcc'):'✨ '+t('createAcc');
        document.getElementById('lblName').textContent=t('name');
        document.getElementById('lblPass').textContent=t('password');
        document.getElementById('emptyText').textContent=t('empty');
        document.getElementById('msgInput').placeholder=t('message');
        document.getElementById('searchInput').placeholder=t('search');
        document.getElementById('navChats').textContent=t('chats');
        document.getElementById('navContacts').textContent=t('contacts');
        document.getElementById('navSettings').textContent=t('settings');
        document.getElementById('navProfile').textContent=t('profile');
        document.getElementById('createTitle').textContent='✨ '+t('create');
        document.getElementById('lblCreateName').textContent=t('name');
        document.getElementById('btnChannel').textContent=t('channel');
        document.getElementById('btnGroup').textContent=t('group');
        document.getElementById('btnCancel').textContent=t('cancel');
        document.getElementById('premDesc').textContent=t('premDesc');
        document.getElementById('btnActivate').textContent=t('activate');
        document.getElementById('btnCancelPrem').textContent=t('cancelPrem');
        document.getElementById('btnClose').textContent=t('close');
        document.getElementById('giftTitle').textContent=t('giftShop');
        document.getElementById('giftStarsLabel').textContent=t('yourStars');
        document.getElementById('btnCloseGift').textContent=t('close');
        document.getElementById('ht').textContent=page==='chats'?'FuruGram':t(page);
        if(page==='profile')rp();
        if(page==='settings')rs();
    }

    function allChats(){
        const d=md(), users=gu(), chs=gc(), grs=gg();
        const list=[];
        (d.contacts||[]).forEach(cid=>{if(users[cid]){const u=users[cid]; list.push({id:cid,type:'personal',name:u.name,username:u.username,avatar:u.avatar,online:u.online,premium:u.premium,initials:u.name.charAt(0),messages:d.messages[cid]||[]});}});
        (d.channels||[]).forEach(chId=>{if(chs[chId]){const c=chs[chId]; list.push({id:chId,type:'channel',name:c.name,initials:c.name.charAt(0),subscribers:c.subscribers||1,messages:d.messages[chId]||[]});}});
        (d.groups||[]).forEach(grId=>{if(grs[grId]){const g=grs[grId]; list.push({id:grId,type:'group',name:g.name,initials:g.name.charAt(0),members:g.members||1,messages:d.messages[grId]||[]});}});
        return list;
    }

    function rc(){
        if(!U)return;
        const chats=allChats();
        const q=(document.getElementById('searchInput').value||'').toLowerCase();
        const filtered=chats.filter(c=>c.name.toLowerCase().includes(q)||(c.username||'').toLowerCase().includes(q));
        const el=document.getElementById('chatList'); el.innerHTML='';
        if(filtered.length===0){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text-secondary);">${t('noChats')}</div>`;return;}
        filtered.forEach(c=>{
            const last=c.messages&&c.messages.length?c.messages[c.messages.length-1]:null;
            const div=document.createElement('div');
            div.className='chat-item'+(active===c.id?' active':'');
            div.onclick=()=>openChat(c);
            let badge=''; if(c.type==='channel')badge='<span class="badge badge-channel">канал</span>'; if(c.type==='group')badge='<span class="badge badge-group">группа</span>';
            const dot=(c.type==='personal'&&c.online)?'<span class="online-dot"></span>':'';
            const avClass=(c.type==='channel'?' channel':c.type==='group'?' group':'')+(c.premium?' pr':'');
            div.innerHTML=`<div class="avatar${avClass}">${c.avatar?`<img src="${c.avatar}">`:c.initials}${dot}</div><div class="cbody"><div class="cname">${c.name} ${badge}</div><div class="cpreview">${last?(last.text||'').substring(0,30):'Нет сообщений'}</div></div>`;
            el.appendChild(div);
        });
    }

    function openChat(c){
        active=c.id;
        document.getElementById('emptyState').style.display='none';
        document.getElementById('chatHead').style.display='flex';
        document.getElementById('messages').style.display='flex';
        document.getElementById('inputRow').style.display='flex';
        document.getElementById('chatNm').textContent=c.name;
        const av=document.getElementById('chatAv'); av.className='avatar sm'+(c.type==='channel'?' channel':c.type==='group'?' group':'')+(c.premium?' pr':'');
        av.innerHTML=c.avatar?`<img src="${c.avatar}">`:c.initials;
        if(c.type==='channel'){document.getElementById('chatSt').innerHTML='📢 '+c.subscribers+' подписчиков';document.getElementById('inputRow').style.display='none';}
        else if(c.type==='group'){document.getElementById('chatSt').innerHTML='👥 '+c.members+' участников';document.getElementById('inputRow').style.display='flex';}
        else{document.getElementById('chatSt').innerHTML=(c.online?'<span class="dot on"></span>'+t('online'):'<span class="dot off"></span>'+t('offline'));document.getElementById('inputRow').style.display='flex';}
        renderMsgs();
        if(window.innerWidth<=768)document.getElementById('sidebar').classList.add('hide');
    }
    function renderMsgs(){
        const el=document.getElementById('messages'); if(!active)return;
        el.innerHTML='';
        const dd=document.createElement('div'); dd.className='dsep'; dd.innerHTML=`<span>${t('today')}</span>`; el.appendChild(dd);
        const d=md(); const msgs=d.messages&&d.messages[active]?d.messages[active]:[];
        msgs.forEach(m=>{
            const div=document.createElement('div'); div.className='msg '+(m.out?'out':'in');
            let sender=''; if((c.type==='group'||c.type==='channel')&&!m.out&&m.sender)sender=`<div class="msnd">${m.sender}</div>`;
            div.innerHTML=`<div class="mbub">${sender}${m.text}<div class="mtime">${m.time}</div></div>`;
            el.appendChild(div);
        });
        el.scrollTop=el.scrollHeight;
    }

    function rco(){ /* аналогично предыдущему, без изменений */ }
    function rp(){ /* аналогично, но с вызовом window.editF и т.д. */ }
    function rs(){ /* аналогично */ }

    // ===== ПОИСК ДРУЗЕЙ (улучшено) =====
    document.getElementById('searchInput').addEventListener('input', function(){
        const q=this.value.trim().toLowerCase();
        if(!U) return;
        if(q.length>=2){
            const users=gu();
            for(const id in users){
                if(id!==U.id && (users[id].username.toLowerCase().includes(q) || users[id].name.toLowerCase().includes(q))){
                    if(addContact(id)){
                        toast('✅ '+users[id].name+' '+t('contactAdded'));
                        rc(); // обновить список
                        return;
                    }
                }
            }
            toast('🔍 Пользователь не найден');
        }
        rc(); // обновить фильтр даже если нет поиска
    });

    // ===== BROADCAST CHANNEL =====
    BC.onmessage=function(e){
        const d=e.data; if(!U)return;
        if(d.type==='msg'){
            const data=md(); if(!data.messages)data.messages={};
            let target=null;
            if(d.chatType==='personal'&&d.to===U.id){
                target=d.from; if(!data.contacts)data.contacts=[]; if(!data.contacts.includes(d.from))data.contacts.push(d.from);
            }
            if(target&&d.from!==U.id){
                if(!data.messages[target])data.messages[target]=[];
                data.messages[target].push({text:d.msg.text,time:d.msg.time,out:false,read:false,sender:d.msg.sender});
                smd(data);
                if(active===target)renderMsgs();
                rc();
                if(Notification.permission==='granted'){new Notification('FuruGram',{body:'New message from @'+d.msg.sender});}
            }
        }
    };

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    document.getElementById('avatarInput').addEventListener('change',function(e){
        const f=e.target.files[0]; if(!f)return;
        const r=new FileReader();
        r.onload=function(ev){U.avatar=ev.target.result; const users=gu(); users[U.id].avatar=U.avatar; su(users); rp(); toast('📷 '+t('avatarUpdated'));};
        r.readAsDataURL(f);
    });

    (function(){
        const savedLang=localStorage.getItem('fg_lang'); if(savedLang)LANG=savedLang;
        const theme=localStorage.getItem('fg_theme'); if(theme==='dark'){document.body.classList.add('dark');}
        const s=gs(); if(s&&s.id){const users=gu(); if(users[s.id]&&users[s.id].password===s.password){U=users[s.id]; U.online=true; su(users); document.getElementById('loginScreen').style.display='none'; go('chats'); return;}}
        document.getElementById('loginScreen').style.display='flex';
        updateAllTexts();
    })();
    go('chats');
    console.log('🚀 FuruGram v29.0 — Создание каналов и поиск друзей исправлены!');
})();
</script>
