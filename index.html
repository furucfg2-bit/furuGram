<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --surface3: #e4e6eb;
            --chat-bg: #ffffff;
            --accent: #3390ec;
            --accent-light: #4da3f5;
            --premium: #d4a843;
            --premium-light: #f0c860;
            --text: #000000;
            --text-secondary: #707579;
            --text-muted: #8d9298;
            --border: #e0e0e0;
            --hover: #f0f2f5;
            --bubble-out: #f0f2f5;
            --bubble-in: #3390ec;
            --online: #4caf50;
            --danger: #e53935;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --header-height: 56px;
            --nav-height: 56px;
        }
        .dark {
            --bg: #18222e;
            --surface: #1c2838;
            --surface2: #212e3e;
            --surface3: #263444;
            --chat-bg: #18222e;
            --accent: #5b8cce;
            --accent-light: #6a9bd4;
            --text: #e9e9e9;
            --text-secondary: #8a9bb0;
            --text-muted: #5e6e80;
            --border: #253040;
            --hover: #212e3e;
            --bubble-out: #212e3e;
            --bubble-in: #2b5278;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            color: var(--text);
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }
        .app {
            width: 100%; max-width: 1100px;
            height: 100vh; height: 100dvh;
            background: var(--bg);
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: background 0.3s;
        }
        @media(min-width:769px){.app{height:94vh;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,0.1);}}

        .header {
            height: var(--header-height);
            padding: 0 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-title { font-size: 1.2rem; font-weight: 600; color: var(--text); }
        .header-actions { display: flex; gap: 4px; }
        .hbtn {
            width: 36px; height: 36px; border-radius: 50%;
            background: transparent; border: none; color: var(--text-secondary);
            font-size: 1.1rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: 0.15s;
        }
        .hbtn:active { background: var(--hover); }

        .content { flex-grow:1; display:flex; overflow:hidden; position:relative; }

        .sidebar {
            width:100%; background:var(--surface); display:flex;
            flex-direction:column; position:absolute; inset:0; z-index:5;
            transition: transform 0.25s;
        }
        @media(min-width:769px){.sidebar{width:340px;min-width:340px;max-width:340px;position:relative;border-right:1px solid var(--border);}}
        .sidebar.hide{transform:translateX(-100%);}
        @media(min-width:769px){.sidebar.hide{transform:none;}}

        .search-box { margin: 8px 12px; position: relative; flex-shrink: 0; }
        .search-box input {
            width:100%; padding:10px 10px 10px 38px; background:var(--surface2);
            border:1px solid transparent; border-radius: 22px; color:var(--text);
            font-size:0.9rem; outline:none; transition:0.2s;
        }
        .search-box input:focus { border-color: var(--accent); background: var(--surface); }
        .search-box i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); }

        .chat-list { flex-grow:1; overflow-y:auto; }
        .chat-item {
            display:flex; align-items:center; gap:12px; padding:10px 14px;
            cursor:pointer; transition:0.15s;
        }
        .chat-item:active { background:var(--hover); }
        .chat-item.active { background:var(--hover); }

        .avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--accent); display:flex; align-items:center;
            justify-content:center; font-weight:700; font-size:1.2rem;
            color:white; flex-shrink:0; overflow:hidden; position:relative;
            background-size:cover; background-position:center;
        }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .avatar.sm { width: 38px; height: 38px; font-size: 0.9rem; }
        .avatar.lg { width: 80px; height: 80px; font-size: 2.2rem; }
        .avatar.pr { border: 2px solid var(--premium); box-shadow: 0 0 12px rgba(212,168,67,0.3); }
        .online-dot {
            position:absolute; bottom:1px; right:1px; width:11px; height:11px;
            background:var(--online); border-radius:50%; border:2px solid var(--surface);
        }

        .cbody { flex-grow:1; min-width:0; }
        .cname { font-weight:500; font-size:0.95rem; color:var(--text); }
        .cpreview { font-size:0.82rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
        .cmeta { text-align:right; flex-shrink:0; }
        .unread { background:var(--accent); color:white; font-size:0.7rem; padding:2px 7px; border-radius:12px; display:inline-block; margin-top:2px; min-width:20px; text-align:center; }

        .chat-area { flex-grow:1; display:flex; flex-direction:column; background:var(--chat-bg); }
        .chat-head {
            height: var(--header-height); padding:0 14px;
            border-bottom:1px solid var(--border); display:flex;
            align-items:center; gap:10px; background:var(--surface); flex-shrink:0;
        }
        .back-btn {
            width:34px; height:34px; border-radius:50%; background:transparent;
            border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer;
            display:none; align-items:center; justify-content:center;
        }
        @media(max-width:768px){.back-btn{display:flex;}}
        .chinfo { flex-grow:1; min-width:0; }
        .chname { font-weight:500; font-size:1rem; color:var(--text); }
        .chstatus { font-size:0.75rem; color:var(--text-secondary); }
        .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; }
        .dot.on { background:var(--online); }
        .dot.off { background:var(--text-muted); }

        .msgs { flex-grow:1; padding:12px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
        .msg { display:flex; max-width:75%; animation:msgIn 0.2s; }
        @keyframes msgIn { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }
        .msg.out { align-self:flex-end; }
        .mbub {
            padding:8px 12px; border-radius:16px; font-size:0.93rem;
            line-height:1.4; word-break:break-word; position:relative;
        }
        .msg.in .mbub { background:var(--bubble-out); border-bottom-left-radius:4px; color:var(--text); }
        .msg.out .mbub { background:var(--bubble-in); color:white; border-bottom-right-radius:4px; }
        .msg-img { max-width:200px; border-radius:10px; margin-bottom:4px; cursor:pointer; }
        .msg-sticker { font-size:3rem; }
        .msg-voice { display:flex; align-items:center; gap:8px; padding:4px 0; }
        .voice-btn-sm { width:30px;height:30px;border-radius:50%;background:var(--accent);border:none;color:white;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center; }
        .voice-dur { font-size:0.75rem; opacity:0.8; }
        .msnd { font-size:0.72rem; font-weight:600; color:var(--accent); margin-bottom:2px; }
        .mtime { font-size:0.62rem; opacity:0.6; text-align:right; margin-top:3px; }
        .dsep { text-align:center; margin:8px 0; font-size:0.72rem; color:var(--text-muted); }
        .dsep span { background:var(--chat-bg); padding:3px 12px; border-radius:10px; border:1px solid var(--border); }

        .input-row {
            padding:8px 12px; padding-bottom:calc(8px + var(--safe-bottom));
            border-top:1px solid var(--border); display:flex; align-items:center;
            gap:6px; background:var(--surface); flex-shrink:0;
        }
        .attach-btn, .emoji-btn, .sticker-btn, .voice-btn {
            width:36px; height:36px; border-radius:50%; background:transparent;
            border:none; color:var(--text-secondary); cursor:pointer; font-size:1.1rem;
            display:flex; align-items:center; justify-content:center; transition:0.15s; flex-shrink:0;
        }
        .attach-btn:active, .emoji-btn:active, .sticker-btn:active, .voice-btn:active { color:var(--accent); }
        .voice-btn.rec { color:var(--danger); animation:pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .input-row input {
            flex-grow:1; min-width:60px; padding:9px 14px;
            background:var(--surface2); border:1px solid transparent; border-radius:22px;
            color:var(--text); font-size:0.92rem; outline:none; transition:0.2s;
        }
        .input-row input:focus { border-color:var(--accent); background:var(--surface); }
        .send-btn {
            width:38px; height:38px; border-radius:50%; background:var(--accent);
            border:none; color:white; font-size:0.95rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:0.15s;
        }
        .send-btn:active { transform:scale(0.9); }

        .emoji-picker, .sticker-picker {
            display:none; flex-wrap:wrap; gap:4px; padding:8px;
            background:var(--surface); border-top:1px solid var(--border);
            max-height:150px; overflow-y:auto; flex-shrink:0;
        }
        .emoji-picker.show, .sticker-picker.show { display:flex; }
        .emoji-item, .sticker-item {
            width:36px; height:36px; display:flex; align-items:center;
            justify-content:center; font-size:1.3rem; cursor:pointer; border-radius:8px;
        }
        .sticker-item { font-size:2rem; }
        .emoji-item:active, .sticker-item:active { background:var(--hover); }

        .empty { flex-grow:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--text-secondary); gap:8px; text-align:center; padding:20px; }
        .empty i { font-size:3.5rem; opacity:0.12; }

        .page { position:absolute; inset:0; background:var(--bg); z-index:6; overflow-y:auto; display:none; }
        .page.show { display:block; }

        /* PROFILE (Telegram-style) */
        .prof-cover { height:120px; background:linear-gradient(135deg,var(--accent),#6ab0f3); position:relative; }
        .prof-av-wrap { position:absolute; bottom:-40px; left:16px; }
        .prof-av-lg {
            width:80px; height:80px; border-radius:50%; background:var(--accent);
            border:4px solid var(--surface); display:flex; align-items:center;
            justify-content:center; font-size:2rem; font-weight:700; color:white;
            overflow:hidden; background-size:cover; background-position:center;
        }
        .prof-av-lg img { width:100%; height:100%; object-fit:cover; }
        .prof-info { padding:50px 16px 16px; }
        .prof-name-lg { font-size:1.3rem; font-weight:600; color:var(--text); }
        .prof-uname-lg { color:var(--text-secondary); font-size:0.9rem; }
        .prof-bio-lg { color:var(--text); font-size:0.9rem; margin-top:8px; }
        .prof-stats-row { display:flex; gap:20px; margin-top:12px; }
        .pstat { text-align:center; cursor:pointer; }
        .pstat-num { font-weight:600; font-size:1.1rem; color:var(--text); }
        .pstat-lbl { font-size:0.72rem; color:var(--text-secondary); }

        .stories-row { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; }
        .story-circle {
            width:64px; height:64px; border-radius:50%; flex-shrink:0;
            border:3px solid var(--accent); padding:3px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            background:var(--surface); transition:0.15s;
        }
        .story-circle:active { transform:scale(0.9); }
        .story-circle .inner {
            width:100%; height:100%; border-radius:50%;
            background:linear-gradient(135deg,#f093fb,#f5576c,#fda085);
            display:flex; align-items:center; justify-content:center;
            font-size:0.8rem; color:white; font-weight:600;
        }
        .story-add { border-color:var(--text-muted); border-style:dashed; }

        .psec { margin:8px 0; background:var(--surface); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
        .psec-title { padding:12px 16px 6px; font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
        .pitem {
            display:flex; align-items:center; padding:14px 16px; cursor:pointer;
            color:var(--text); font-size:0.95rem; gap:14px; border-bottom:1px solid var(--border);
            transition:0.15s;
        }
        .pitem:last-child { border-bottom:none; }
        .pitem:active { background:var(--hover); }
        .pitem i { width:22px; text-align:center; font-size:1rem; color:var(--text-secondary); }
        .pitem .pv { color:var(--text-secondary); font-size:0.88rem; margin-left:auto; }
        .pitem.danger { color:var(--danger); }
        .pitem.danger i { color:var(--danger); }

        .sitem {
            display:flex; align-items:center; padding:14px 16px; cursor:pointer;
            color:var(--text); font-size:0.95rem; gap:14px; border-bottom:1px solid var(--border);
            transition:0.15s;
        }
        .sitem:active { background:var(--hover); }
        .sitem i { width:22px; text-align:center; color:var(--text-secondary); }
        .sitem .sv { color:var(--text-muted); font-size:0.88rem; margin-left:auto; }

        .nav {
            height:var(--nav-height); display:flex; background:var(--surface);
            border-top:1px solid var(--border); padding-bottom:var(--safe-bottom); flex-shrink:0;
        }
        .ni {
            flex:1; display:flex; flex-direction:column; align-items:center;
            padding:6px 0; cursor:pointer; color:var(--text-secondary);
            border:none; background:transparent; font-size:0.6rem; gap:3px; transition:0.15s;
        }
        .ni i { font-size:1.3rem; }
        .ni.active { color:var(--accent); }

        .login-screen {
            position:fixed; inset:0; background:var(--bg); z-index:999;
            display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .login-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:14px; padding:30px 24px; width:100%; max-width:360px;
        }
        .login-card h2 { text-align:center; font-size:1.4rem; color:var(--text); margin-bottom:4px; }
        .login-card .sub { text-align:center; color:var(--text-secondary); font-size:0.85rem; margin-bottom:20px; }
        .field { margin-bottom:12px; }
        .field label { display:block; font-size:0.8rem; color:var(--text-secondary); margin-bottom:5px; }
        .field input {
            width:100%; padding:12px; background:var(--surface2);
            border:1px solid var(--border); border-radius:8px; color:var(--text);
            font-size:0.95rem; outline:none; transition:0.2s;
        }
        .field input:focus { border-color:var(--accent); }
        .btn {
            width:100%; padding:13px; border:none; border-radius:8px;
            font-weight:600; font-size:0.95rem; cursor:pointer; margin-top:8px; transition:0.15s;
        }
        .btn:active { transform:scale(0.97); }
        .btn-p { background:var(--accent); color:white; }
        .btn-o { background:transparent; color:var(--accent); }
        .err { color:var(--danger); font-size:0.78rem; text-align:center; margin-top:6px; display:none; }
        .err.show { display:block; }
        .ok { color:var(--online); font-size:0.78rem; text-align:center; margin-top:6px; display:none; }
        .ok.show { display:block; }

        .toast {
            position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
            background:var(--surface3); color:var(--text); padding:10px 20px;
            border-radius:22px; font-size:0.85rem; z-index:250; pointer-events:none;
            border:1px solid var(--border); animation:tIn 0.3s,tOut 0.3s 2.2s forwards; white-space:nowrap;
        }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes tOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-10px);} }

        .prem-overlay {
            position:fixed; inset:0; z-index:300; pointer-events:none;
            display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4);
        }
        .prem-anim { text-align:center; animation:premBoom 2s ease-out forwards; }
        .prem-anim .st { font-size:5rem; animation:starSpin 0.5s ease-in-out 3; }
        .prem-anim .tx { font-size:1.5rem; font-weight:700; color:#f0c860; margin-top:10px; }
        @keyframes premBoom { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.3);opacity:1} 100%{transform:scale(2);opacity:0} }
        @keyframes starSpin { 0%,100%{transform:rotate(0)scale(1)} 50%{transform:rotate(180deg)scale(1.5)} }

        .prem-icon { color: var(--premium); font-size: 0.8rem; margin-left: 2px; }
    </style>
</head>
<body class="light">

<div class="app" id="app">
    <div class="header">
        <div class="header-title" id="ht">FuruGram</div>
        <div class="header-actions">
            <button class="hbtn" onclick="showCreate()"><i class="fas fa-plus"></i></button>
            <button class="hbtn" onclick="showPrem()" style="color:var(--premium);"><i class="fas fa-star"></i></button>
        </div>
    </div>
    <div class="content">
        <div class="sidebar" id="sidebar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Поиск..." id="searchInput" autocomplete="off"></div>
            <div class="chat-list" id="chatList"></div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState"><i class="fas fa-comments"></i><h3>FuruGram</h3><p>Выберите чат</p></div>
            <div class="chat-head" id="chatHead" style="display:none;">
                <button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
                <div class="avatar sm" id="chatAv">A</div>
                <div class="chinfo"><div class="chname" id="chatNm"></div><div class="chstatus" id="chatSt"></div></div>
            </div>
            <div class="msgs" id="messages" style="display:none;"></div>
            <div class="emoji-picker" id="emojiPicker"></div>
            <div class="sticker-picker" id="stickerPicker"></div>
            <div class="input-row" id="inputRow" style="display:none;">
                <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
                <button class="emoji-btn" id="emojiBtn">😊</button>
                <button class="sticker-btn" id="stickerBtn">🌟</button>
                <input type="text" placeholder="Сообщение..." id="msgInput" autocomplete="off">
                <button class="voice-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
                <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>
    <div class="nav">
        <button class="ni active" data-p="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
        <button class="ni" data-p="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></button>
        <button class="ni" data-p="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
        <button class="ni" data-p="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>
</div>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🔐 FuruGram</h2>
        <p class="sub" id="loginSub">Войдите в аккаунт</p>
        <div class="field"><label>Email</label><input type="email" id="lemail" placeholder="your@email.com"></div>
        <div class="field" id="nameField" style="display:none;"><label>Имя</label><input type="text" id="lname" placeholder="Ваше имя"></div>
        <div class="field"><label>Пароль</label><input type="password" id="lpass" placeholder="••••••"></div>
        <div class="err" id="lerr"></div><div class="ok" id="lok"></div>
        <button class="btn btn-p" id="loginBtn" onclick="handleAuth()">🚀 Войти</button>
        <button class="btn btn-o" id="switchBtn" onclick="toggleMode()">✨ Создать аккаунт</button>
    </div>
</div>

<div class="modal-bg" id="createModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center;">
    <div style="background:var(--surface);border-radius:14px 14px 0 0;padding:22px;width:100%;max-width:500px;">
        <h2 style="text-align:center;margin-bottom:16px;color:var(--text);">✨ Создать</h2>
        <div class="field"><label>Название</label><input type="text" id="cname"></div>
        <button class="btn btn-p" onclick="doCreate('channel')" style="width:100%;">📢 Канал</button>
