<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#18222e">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #18222e;
            --surface: #1c2838;
            --surface2: #212e3e;
            --surface3: #263444;
            --chat-bg: #18222e;
            --accent: #5b8cce;
            --accent-light: #6a9bd4;
            --premium: #d4a843;
            --premium-light: #f0c860;
            --text: #e9e9e9;
            --text-secondary: #8a9bb0;
            --text-muted: #5e6e80;
            --border: #253040;
            --hover: #212e3e;
            --bubble-out: #212e3e;
            --bubble-in: #2b5278;
            --online: #4caf50;
            --danger: #e74c3c;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #141c26;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            color: var(--text);
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (min-width: 769px) {
            .app { height: 94vh; border-radius: 10px; border: 1px solid var(--border); }
        }

        /* HEADER */
        .header {
            padding: 14px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-title { font-size: 1.25rem; font-weight: 600; color: var(--text); }
        .header-actions { display: flex; gap: 2px; }
        .hbtn {
            width: 36px; height: 36px; border-radius: 50%;
            background: transparent; border: none; color: var(--text-secondary);
            font-size: 1rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }
        .hbtn:active { background: var(--hover); }

        /* CONTENT */
        .content { flex-grow: 1; display: flex; overflow: hidden; position: relative; }

        /* SIDEBAR */
        .sidebar {
            width: 100%; background: var(--bg); display: flex;
            flex-direction: column; position: absolute; inset: 0; z-index: 5;
        }
        @media (min-width: 769px) {
            .sidebar { width: 340px; min-width: 340px; max-width: 340px; position: relative; border-right: 1px solid var(--border); }
        }
        .sidebar.hide { display: none; }
        @media (min-width: 769px) { .sidebar.hide { display: flex; } }

        .search-box { margin: 8px 10px; position: relative; }
        .search-box input {
            width: 100%; padding: 10px 10px 10px 36px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 0.9rem; outline: none;
        }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .chat-list { flex-grow: 1; overflow-y: auto; }
        .chat-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer;
        }
        .chat-item:active { background: var(--hover); }
        @media (min-width: 769px) { .chat-item:hover { background: var(--hover); } }
        .chat-item.active { background: var(--hover); }

        .avatar {
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem; color: white; flex-shrink: 0; overflow: hidden;
            position: relative; background-size: cover; background-position: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar.sm { width: 38px; height: 38px; font-size: 0.9rem; }
        .avatar.lg { width: 72px; height: 72px; font-size: 2rem; }
        .avatar.pr { border: 2px solid var(--premium); box-shadow: 0 0 10px rgba(212,168,67,0.4); }
        .online-dot {
            position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px;
            background: var(--online); border-radius: 50%; border: 2px solid var(--bg);
        }

        .cbody { flex-grow: 1; min-width: 0; }
        .cname { font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 5px; }
        .badge {
            font-size: 0.6rem; padding: 1px 5px; border-radius: 3px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
        }
        .badge-ch { background: rgba(91,140,206,0.2); color: #74b9ff; }
        .badge-gr { background: rgba(76,175,80,0.2); color: #81c784; }
        .cpreview {
            font-size: 0.82rem; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px;
        }
        .cmeta { text-align: right; flex-shrink: 0; }
        .unread {
            background: var(--accent); color: white; font-size: 0.7rem;
            padding: 3px 7px; border-radius: 12px; display: inline-block;
        }

        /* CHAT AREA */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        .chat-head {
            padding: 12px 14px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; background: var(--surface);
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: 50%; background: transparent;
            border: none; color: var(--text-secondary); font-size: 1rem; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }
        @media (max-width: 768px) { .back-btn { display: flex; } }
        .chinfo { flex-grow: 1; min-width: 0; }
        .chname { font-weight: 500; font-size: 1rem; }
        .chstatus { font-size: 0.75rem; color: var(--text-secondary); }
        .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
        .dot.on { background: var(--online); }
        .dot.off { background: var(--text-muted); }

        .msgs { flex-grow: 1; padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .msg { display: flex; max-width: 75%; }
        .msg.out { align-self: flex-end; }
        .mbub { padding: 8px 12px; border-radius: 10px; font-size: 0.92rem; line-height: 1.4; word-break: break-word; }
        .msg.in .mbub { background: var(--bubble-out); }
        .msg.out .mbub { background: var(--bubble-in); color: white; }
        .msnd { font-size: 0.72rem; font-weight: 600; color: var(--accent); margin-bottom: 2px; }
        .mtime { font-size: 0.65rem; opacity: 0.5; text-align: right; margin-top: 3px; }
        .msg.out .mtime { opacity: 0.7; }
        .dsep { text-align: center; margin: 8px 0; font-size: 0.72rem; color: var(--text-muted); }
        .dsep span { background: var(--chat-bg); padding: 2px 10px; border-radius: 8px; border: 1px solid var(--border); }

        .input-row {
            padding: 8px 12px; padding-bottom: calc(8px + var(--safe-bottom));
            border-top: 1px solid var(--border); display: flex; align-items: center;
            gap: 8px; background: var(--surface);
        }
        .input-row input {
            flex-grow: 1; padding: 10px 14px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 20px; color: var(--text);
            font-size: 0.9rem; outline: none;
        }
        .sbtn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
            border: none; color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 0.9rem;
        }
        .sbtn:active { transform: scale(0.9); }

        .empty {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: var(--text-secondary); gap: 8px;
        }

        /* PAGES */
        .page { position: absolute; inset: 0; background: var(--bg); z-index: 6; overflow-y: auto; display: none; }
        .page.show { display: block; }

        /* PROFILE */
        .prof-top {
            padding: 20px 16px; text-align: center; background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .prof-av {
            width: 72px; height: 72px; border-radius: 50%; background: var(--accent);
            margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 700; color: white; cursor: pointer; overflow: hidden;
        }
        .prof-av img { width: 100%; height: 100%; object-fit: cover; }
        .prof-av.pr { border: 3px solid var(--premium); box-shadow: 0 0 15px rgba(212,168,67,0.4); }
        .prof-name { font-size: 1.3rem; font-weight: 600; }
        .prof-uname { color: var(--text-secondary); font-size: 0.9rem; margin-top: 2px; }
        .prof-bio { color: var(--text-secondary); font-size: 0.85rem; margin-top: 6px; }
        .prof-stats { display: flex; justify-content: center; gap: 20px; margin-top: 14px; }
        .pstat { text-align: center; }
        .pstat-num { font-weight: 600; font-size: 1.1rem; }
        .pstat-lbl { font-size: 0.7rem; color: var(--text-muted); }

        .psec { margin: 12px 0; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .psec-title { padding: 12px 16px 6px; font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .pitem {
            display: flex; align-items: center; padding: 14px 16px; cursor: pointer;
            color: var(--text); font-size: 0.95rem; gap: 14px; border-bottom: 1px solid var(--border);
        }
        .pitem:last-child { border-bottom: none; }
        .pitem:active { background: var(--hover); }
        .pitem i { width: 24px; text-align: center; font-size: 1rem; color: var(--text-secondary); }
        .pitem .pv { color: var(--text-secondary); font-size: 0.88rem; margin-left: auto; }
        .pitem.danger { color: var(--danger); }
        .pitem.danger i { color: var(--danger); }

        /* CONTACTS */
        .citem {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            cursor: pointer; border-bottom: 1px solid var(--border);
        }
        .citem:active { background: var(--hover); }

        /* SETTINGS */
        .sitem {
            display: flex; align-items: center; padding: 14px 16px; cursor: pointer;
            color: var(--text); font-size: 0.95rem; gap: 14px; border-bottom: 1px solid var(--border);
        }
        .sitem:active { background: var(--hover); }
        .sitem i { width: 24px; text-align: center; color: var(--text-secondary); }
        .sitem .sv { color: var(--text-muted); font-size: 0.88rem; margin-left: auto; }

        /* BOTTOM NAV */
        .nav {
            display: flex; background: var(--surface); border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom); flex-shrink: 0;
        }
        .ni {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 8px 0; cursor: pointer; color: var(--text-secondary);
            border: none; background: transparent; font-size: 0.65rem; gap: 3px;
        }
        .ni i { font-size: 1.2rem; }
        .ni.active { color: var(--accent); }

        /* MODALS */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
            display: flex; align-items: flex-end; justify-content: center;
        }
        .modal {
            background: var(--surface); border-radius: 14px 14px 0 0;
            padding: 20px; width: 100%; max-width: 500px; max-height: 70vh; overflow-y: auto;
        }
        .modal h2 { font-size: 1.1rem; font-weight: 600; text-align: center; margin-bottom: 16px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; }
        .field input {
            width: 100%; padding: 10px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 8px;
        }
        .btn-p { background: var(--accent); color: white; }
        .btn-pr { background: linear-gradient(135deg, #d4a843, #f0c860); color: #1a1a2e; font-weight: 700; }
        .btn-d { background: var(--danger); color: white; }

        /* PREMIUM ANIMATION */
        .prem-overlay {
            position: fixed; inset: 0; z-index: 200; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        .prem-anim { text-align: center; animation: pb 2s ease-out forwards; }
        .prem-anim .st { font-size: 5rem; animation: ss 0.5s ease-in-out 3; }
        .prem-anim .tx { font-size: 1.5rem; font-weight: 700; color: var(--premium-light); margin-top: 10px; }
        @keyframes pb { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.5);opacity:1} 100%{transform:scale(2);opacity:0} }
        @keyframes ss { 0%,100%{transform:rotate(0)scale(1)} 50%{transform:rotate(180deg)scale(1.5)} }

        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: var(--surface3); color: white; padding: 10px 18px;
            border-radius: 20px; font-size: 0.85rem; z-index: 200;
            pointer-events: none; animation: tIn 0.3s, tOut 0.3s 2s forwards;
        }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes tOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-10px);} }

        @media (max-width: 768px) {
            .header { padding: 12px 14px; }
            .header-title { font-size: 1.15rem; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <div class="header-title" id="ht">FuruGram</div>
        <div class="header-actions">
            <button class="hbtn" onclick="showCreate()"><i class="fas fa-plus"></i></button>
            <button class="hbtn" onclick="showPrem()" style="color:var(--premium);"><i class="fas fa-star"></i></button>
        </div>
    </div>

    <div class="content">
        <div class="sidebar" id="sidebar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Поиск..." id="searchInput">
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState">
                <i class="fas fa-comments" style="font-size:3rem;opacity:0.15;"></i>
                <h3>FuruGram</h3>
                <p>Выберите чат</p>
            </div>
            <div class="chat-head" id="chatHead" style="display:none;">
                <button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
                <div class="avatar sm" id="chatAv">A</div>
                <div class="chinfo">
                    <div class="chname" id="chatNm"></div>
                    <div class="chstatus" id="chatSt"></div>
                </div>
            </div>
            <div class="msgs" id="messages" style="display:none;"></div>
            <div class="input-row" id="inputRow" style="display:none;">
                <input type="text" placeholder="Сообщение..." id="msgInput">
                <button class="sbtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>

    <div class="nav">
        <button class="ni active" data-p="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
        <button class="ni" data-p="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></button>
        <button class="ni" data-p="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
        <button class="ni" data-p="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>
</div>

<!-- ВХОД -->
<div class="modal-bg" id="loginModal">
    <div class="modal">
        <h2>🔐 Вход в FuruGram</h2>
        <div class="field"><label>Email или телефон</label><input type="text" id="lemail" placeholder="anna@furu.com"></div>
        <div class="field"><label>Пароль</label><input type="password" id="lpass" placeholder="123456"></div>
        <button class="btn btn-p" onclick="doLogin()">Войти</button>
        <p style="text-align:center;margin-top:10px;font-size:0.8rem;color:var(--text-secondary);">
            Тест: anna@furu.com / 123456<br>admin@furu.com / admin123
        </p>
    </div>
</div>

<!-- СОЗДАНИЕ -->
<div class="modal-bg" id="createModal" style="display:none;">
    <div class="modal">
        <h2>Создать</h2>
        <div class="field"><label>Название</label><input type="text" id="cname" placeholder="Название канала или группы"></div>
        <div class="field"><label>Описание</label><input type="text" id="cdesc" placeholder="Описание (необязательно)"></div>
        <button class="btn btn-p" onclick="doCreate('channel')">📢 Создать канал</button>
        <button class="btn btn-p" onclick="doCreate('group')" style="background:#4caf50;">👥 Создать группу</button>
        <button class="btn" style="background:transparent;color:var(--text-secondary);" onclick="hideCreate()">Отмена</button>
    </div>
</div>

<!-- PREMIUM -->
<div class="modal-bg" id="premModal" style="display:none;">
    <div class="modal">
        <h2>⭐ FuruGram Premium</h2>
        <div style="text-align:center;padding:10px;">
            <div style="font-size:3rem;">⭐</div>
            <p style="color:var(--text-secondary);">Эксклюзивные возможности</p>
            <div style="text-align:left;color:var(--text-secondary);font-size:0.85rem;line-height:1.8;margin:10px 0;">
                ✅ Золотая рамка аватара<br>
                ✅ Анимация профиля<br>
                ✅ Эксклюзивные стикеры<br>
                ✅ Приоритетная поддержка
            </div>
        </div>
        <button class="btn btn-pr" id="actPrem" onclick="activatePrem()">Активировать бесплатно</button>
        <button class="btn btn-d" id="cancelPrem" onclick="cancelPrem()" style="display:none;">Отменить Premium</button>
        <button class="btn" style="background:transparent;color:var(--text-secondary);" onclick="hidePrem()">Закрыть</button>
    </div>
</div>

<input type="file" id="afile" accept="image/*" style="display:none;">

<script>
(function() {
    var US = 'fg15_u', DB = 'fg15_d', CH = 'fg15_ch', GR = 'fg15_gr', SS = 'fg15_s';
    var BC = new BroadcastChannel('fg15');

    function gu() { return JSON.parse(localStorage.getItem(US)||'{}'); }
    function su(v) { localStorage.setItem(US,JSON.stringify(v)); }
    function gd() { return JSON.parse(localStorage.getItem(DB)||'{}'); }
    function sd(v) { localStorage.setItem(DB,JSON.stringify(v)); }
    function gc() { return JSON.parse(localStorage.getItem(CH)||'{}'); }
    function sc(v) { localStorage.setItem(CH,JSON.stringify(v)); }
    function gg() { return JSON.parse(localStorage.getItem(GR)||'{}'); }
    function sg(v) { localStorage.setItem(GR,JSON.stringify(v)); }
    function gs() { return JSON.parse(localStorage.getItem(SS)||'null'); }
    function ss(v) { localStorage.setItem(SS,JSON.stringify(v)); }

    if (Object.keys(gu()).length === 0) {
        su({
            'anna@furu.com':{id:'anna@furu.com',type:'email',name:'Анна Иванова',username:'anna',password:'123456',avatar:'',online:false,premium:false,bio:'Люблю путешествия ✈️',phone:'+79001234567',birthday:'15.05.1998'},
            'max@furu.com':{id:'max@furu.com',type:'email',name:'Максим Кодер',username:'max_codes',password:'123456',avatar:'',online:false,premium:false,bio:'Full-stack разработчик 💻',phone:'',birthday:''},
            'admin@furu.com':{id:'admin@furu.com',type:'email',name:'Администратор',username:'admin',password:'admin123',avatar:'',online:false,premium:true,bio:'Главный админ FuruGram',phone:'+79000000000',birthday:'01.01.2020'}
        });
    }

    var U = null;
    var active = null;
    var page = 'chats';

    function toast(m) {
        var t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
        document.body.appendChild(t); setTimeout(function(){t.remove();},2500);
    }

    function premAnim() {
        var o = document.createElement('div'); o.className = 'prem-overlay';
        o.innerHTML = '<div class="prem-anim"><div class="st">⭐</div><div class="tx">Premium!</div></div>';
        document.body.appendChild(o); setTimeout(function(){o.remove();},2000);
    }

    function gid() { return 'id'+Date.now()+Math.random().toString(36).substr(2,6); }

    function md() {
        if (!U) return {contacts:[],messages:{},channels:[],groups:[]};
        var d = gd();
        return d[U.id] || {contacts:[],messages:{},channels:[],groups:[]};
    }
    function smd(v) { var d = gd(); d[U.id] = v; sd(d); }

    function allChats() {
        var d = md(), users = gu(), chs = gc(), grs = gg(), list = [];
        (d.contacts||[]).forEach(function(cid){
            if (users[cid]) {
                var u = users[cid];
                list.push({id:cid,type:'personal',name:u.name,username:'@'+u.username,avatar:u.avatar,online:u.online,premium:u.premium,initials:u.name.charAt(0),unread:(d.messages[cid]||[]).filter(function(m){return !m.read&&!m.out;}).length,messages:d.messages[cid]||[]});
            }
        });
        (d.channels||[]).forEach(function(chId){
            if (chs[chId]) { var c = chs[chId]; list.push({id:chId,type:'channel',name:c.name,initials:c.name.charAt(0),subscribers:c.subscribers||1,unread:(d.messages[chId]||[]).filter(function(m){return !m.read;}).length,messages:d.messages[chId]||[]}); }
        });
        (d.groups||[]).forEach(function(grId){
            if (grs[grId]) { var g = grs[grId]; list.push({id:grId,type:'group',name:g.name,initials:g.name.charAt(0),members:g.members||1,unread:(d.messages[grId]||[]).filter(function(m){return !m.read;}).length,messages:d.messages[grId]||[]}); }
        });
        return list;
    }

    function addContact(cid) {
        var d = md();
        if (!d.contacts) d.contacts = [];
        if (d.contacts.indexOf(cid) === -1) {
            d.contacts.push(cid);
            if (!d.messages) d.messages = {};
            if (!d.messages[cid]) d.messages[cid] = [];
            smd(d);
            return true;
        }
        return false;
    }

    // ===== НАВИГАЦИЯ =====
    function go(p) {
        page = p;
        document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
        var ni = document.querySelector('[data-p="'+p+'"]');
        if (ni) ni.classList.add('active');
        
        document.getElementById('sidebar').classList.toggle('hide', p !== 'chats');
        document.getElementById('contactsPage').classList.toggle('show', p === 'contacts');
        document.getElementById('profilePage').classList.toggle('show', p === 'profile');
        document.getElementById('settingsPage').classList.toggle('show', p === 'settings');
        
        if (p === 'chats') rc();
        if (p === 'contacts') rco();
        if (p === 'profile') rp();
        if (p === 'settings') rs();
        
        document.getElementById('ht').textContent = p==='chats'?'FuruGram':p==='contacts'?'Контакты':p==='profile'?'Профиль':'Настройки';
    }

    document.querySelectorAll('.ni').forEach(function(n){n.addEventListener('click',function(){go(n.dataset.p);});});

    // ===== ЧАТЫ =====
    function rc() {
        if (!U) return;
        var chats = allChats();
        var q = (document.getElementById('searchInput').value||'').toLowerCase();
        if (q) chats = chats.filter(function(c){return c.name.toLowerCase().indexOf(q)!==-1;});
        var el = document.getElementById('chatList');
        el.innerHTML = '';
        if (chats.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Нет чатов</div>';
            return;
        }
        chats.forEach(function(c){
            var last = c.messages.length ? c.messages[c.messages.length-1] : null;
            var div = document.createElement('div');
            div.className = 'chat-item' + (active===c.id?' active':'');
            div.onclick = function(){ openChat(c); };
            var badge = '';
            if (c.type==='channel') badge = '<span class="badge badge-ch">канал</span>';
            if (c.type==='group') badge = '<span class="badge badge-gr">группа</span>';
            var dot = (c.type==='personal'&&c.online)?'<span class="online-dot"></span>':'';
            div.innerHTML = 
                '<div class="avatar'+(c.premium?' pr':'')+'">'+(c.avatar?'<img src="'+c.avatar+'">':c.initials)+dot+'</div>'+
                '<div class="cbody"><div class="cname">'+c.name+' '+badge+'</div><div class="cpreview">'+(last?(last.text||'').substring(0,30):'Нет сообщений')+'</div></div>'+
                '<div class="cmeta">'+(c.unread>0?'<span class="unread">'+c.unread+'</span>':'')+'</div>';
            el.appendChild(div);
        });
    }

    function openChat(c) {
        active = c.id;
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatHead').style.display = 'flex';
        document.getElementById('messages').style.display = 'flex';
        document.getElementById('chatNm').textContent = c.name;
        document.getElementById('chatAv').innerHTML = c.avatar ? '<img src="'+c.avatar+'">' : c.initials;
        document.getElementById('chatAv').className = 'avatar sm' + (c.premium?' pr':'');
        if (c.type==='channel') {
            document.getElementById('chatSt').innerHTML = '📢 '+c.subscribers+' подписчиков';
            document.getElementById('inputRow').style.display = 'none';
        } else if (c.type==='group') {
            document.getElementById('chatSt').innerHTML = '👥 '+c.members+' участников';
            document.getElementById('inputRow').style.display = 'flex';
        } else {
            document.getElementById('chatSt').innerHTML = (c.online?'<span class="dot on"></span>онлайн':'<span class="dot off"></span>оффлайн');
            document.getElementById('inputRow').style.display = 'flex';
        }
        rm(c);
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hide');
        var d = md();
        if (d.messages && d.messages[c.id]) {
            d.messages[c.id].forEach(function(m){m.read=true;});
            smd(d);
        }
    }

    function closeChat() {
        active = null;
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('chatHead').style.display = 'none';
        document.getElementById('messages').style.display = 'none';
        document.getElementById('inputRow').style.display = 'none';
        document.getElementById('sidebar').classList.remove('hide');
    }

    function rm(c) {
        var el = document.getElementById('messages');
        el.innerHTML = '';
        var dd = document.createElement('div'); dd.className = 'dsep'; dd.innerHTML = '<span>Сегодня</span>';
        el.appendChild(dd);
        (c.messages||[]).forEach(function(m){
            var div = document.createElement('div');
            div.className = 'msg '+(m.out?'out':'in');
            var snd = '';
            if ((c.type==='group'||c.type==='channel') && !m.out && m.sender) snd = '<div class="msnd">'+m.sender+'</div>';
            div.innerHTML = '<div class="mbub">'+snd+(m.text||'')+'<div class="mtime">'+(m.time||'')+'</div></div>';
            el.appendChild(div);
        });
        el.scrollTop = el.scrollHeight;
    }

    function sendMsg() {
        var text = document.getElementById('msgInput').value.trim();
        if (!text || !active || !U) return;
        var d = md();
        if (!d.messages) d.messages = {};
        if (!d.messages[active]) d.messages[active] = [];
        var now = new Date();
        var time = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
        var msg = {text:text,time:time,out:true,read:true,sender:U.name};
        d.messages[active].push(msg);
        smd(d);
        document.getElementById('msgInput').value = '';
        var chats = allChats();
        var c = chats.find(function(x){return x.id===active;});
        if (c) rm(c);
        rc();
        BC.postMessage({type:'msg',from:U.id,to:active,msg:msg,chatType:c?c.type:'personal'});
    }

    document.getElementById('msgInput').addEventListener('keypress',function(e){if(e.key==='Enter')sendMsg();});

    // ===== КОНТАКТЫ =====
    function rco() {
        if (!U) return;
        var d = md(), users = gu();
        var contacts = (d.contacts||[]).map(function(cid){return users[cid];}).filter(Boolean);
        var el = document.getElementById('contactsPage');
        el.innerHTML = '';
        if (contacts.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Нет контактов</div>';
            return;
        }
        contacts.forEach(function(c){
            var div = document.createElement('div'); div.className = 'citem';
            div.innerHTML = '<div class="avatar sm">'+(c.avatar?'<img src="'+c.avatar+'">':c.name.charAt(0))+'</div><div><div style="font-weight:500;">'+c.name+'</div><div style="font-size:0.8rem;color:var(--text-secondary);">@'+c.username+'</div></div>';
            div.onclick = function(){go('chats');setTimeout(function(){openChat(c);},100);};
            el.appendChild(div);
        });
    }

    // ===== ПРОФИЛЬ =====
    function rp() {
        if (!U) return;
        var el = document.getElementById('profilePage');
        var d = md();
        var posts = 0;
        for (var k in d.messages) { posts += d.messages[k].filter(function(x){return x.out;}).length; }
        el.innerHTML = 
            '<div class="prof-top">'+
            '<div class="prof-av'+(U.premium?' pr':'')+'" onclick="document.getElementById(\'afile\').click()">'+(U.avatar?'<img src="'+U.avatar+'">':U.name.charAt(0).toUpperCase())+'</div>'+
            '<div class="prof-name">'+U.name+(U.premium?' ⭐':'')+'</div>'+
            '<div class="prof-uname">@'+U.username+'</div>'+
            (U.bio?'<div class="prof-bio">'+U.bio+'</div>':'')+
            '<div class="prof-stats">'+
            '<div class="pstat"><div class="pstat-num">'+(d.contacts||[]).length+'</div><div class="pstat-lbl">контакты</div></div>'+
            '<div class="pstat"><div class="pstat-num">'+posts+'</div><div class="pstat-lbl">публикации</div></div>'+
            '<div class="pstat"><div class="pstat-num">'+(d.channels||[]).length+(d.groups||[]).length+'</div><div class="pstat-lbl">группы/каналы</div></div>'+
            '</div></div>'+
            '<div class="psec">'+
            '<div class="pitem" onclick="editF(\'name\')"><i class="fas fa-user"></i>Имя<span class="pv">'+U.name+'</span></div>'+
            '<div class="pitem" onclick="editF(\'username\')"><i class="fas fa-at"></i>Юзернейм<span class="pv">@'+U.username+'</span></div>'+
            '<div class="pitem" onclick="editF(\'bio\')"><i class="fas fa-info-circle"></i>Био<span class="pv">'+(U.bio||'Не указано')+'</span></div>'+
            '<div class="pitem" onclick="editF(\'phone\')"><i class="fas fa-phone"></i>Телефон<span class="pv">'+(U.phone||'Не указан')+'</span></div>'+
            '<div class="pitem"><i class="fas fa-envelope"></i>Email<span class="pv">'+(U.id.includes('@')?U.id:'Не указан')+'</span></div>'+
            '<div class="pitem" onclick="editF(\'birthday\')"><i class="fas fa-calendar"></i>Дата рождения<span class="pv">'+(U.birthday||'Не указана')+'</span></div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="pitem" onclick="showPrem()"><i class="fas fa-star" style="color:var(--premium);"></i>FuruGram Premium<span class="pv">'+(U.premium?'Активен':'—')+'</span></div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="pitem" onclick="editF(\'password\')"><i class="fas fa-lock"></i>Сменить пароль</div>'+
            '<div class="pitem danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Выйти</div>'+
            '</div>';
    }

    window.editF = function(field) {
        var labels = {name:'Имя',username:'Юзернейм',bio:'Био',phone:'Телефон',birthday:'Дата рождения',password:'Пароль'};
        var values = {name:U.name,username:U.username,bio:U.bio||'',phone:U.phone||'',birthday:U.birthday||'',password:''};
        var nv = prompt(labels[field]+':', values[field]);
        if (nv === null) return;
        nv = nv.trim();
        if (!nv && field!=='bio' && field!=='birthday' && field!=='phone') return;
        var users = gu();
        if (field==='name') { U.name=nv; users[U.id].name=nv; }
        else if (field==='username') {
            if (!/^[a-z0-9_]+$/.test(nv)) { toast('Только латиница, цифры, _'); return; }
            for (var id in users) { if (users[id].username===nv && id!==U.id) { toast('Занят'); return; } }
            U.username=nv; users[U.id].username=nv;
        }
        else if (field==='bio') { U.bio=nv; users[U.id].bio=nv; }
        else if (field==='phone') { U.phone=nv; users[U.id].phone=nv; }
        else if (field==='birthday') { U.birthday=nv; users[U.id].birthday=nv; }
        else if (field==='password') { if (nv.length<3) { toast('Минимум 3 символа'); return; } U.password=nv; users[U.id].password=nv; ss(U); }
        su(users); rp(); toast(labels[field]+' обновлено!');
    };

    window.logout = function() { U=null; active=null; ss(null); document.getElementById('loginModal').style.display='flex'; };

    // ===== НАСТРОЙКИ =====
    function rs() {
        var el = document.getElementById('settingsPage');
        el.innerHTML = 
            '<div class="psec" style="margin-top:0;">'+
            '<div class="sitem"><i class="fas fa-bell"></i>Уведомления и звуки</div>'+
            '<div class="sitem"><i class="fas fa-lock"></i>Приватность и безопасность</div>'+
            '<div class="sitem"><i class="fas fa-palette"></i>Тема<span class="sv">Тёмная</span></div>'+
            '<div class="sitem"><i class="fas fa-globe"></i>Язык<span class="sv">Русский</span></div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="sitem" onclick="toast(\'Кэш очищен!\')"><i class="fas fa-broom"></i>Очистить кэш</div>'+
            '<div class="sitem"><i class="fas fa-info-circle"></i>Версия<span class="sv">15.0</span></div>'+
            '</div>';
    }

    // ===== ПОИСК =====
    document.getElementById('searchInput').addEventListener('input', function(){
        var q = this.value.trim().toLowerCase();
        if (q.length >= 2) {
            var users = gu();
            for (var id in users) {
                if (id !== U.id && (users[id].username.toLowerCase().includes(q) || users[id].name.toLowerCase().includes(q))) {
                    if (addContact(id)) { toast('✅ '+users[id].name+' добавлен!'); rc(); }
                    break;
                }
            }
        }
        rc();
    });

    // ===== СОЗДАНИЕ =====
    function showCreate() { document.getElementById('createModal').style.display='flex'; }
    function hideCreate() { document.getElementById('createModal').style.display='none'; }
    window.doCreate = function(type) {
        var n = document.getElementById('cname').value.trim();
        if (!n) { toast('Введите название'); return; }
        var nid = gid(), d = md();
        if (type==='channel') {
            var chs = gc(); chs[nid] = {id:nid,name:n,desc:document.getElementById('cdesc').value.trim(),creatorId:U.id,subscribers:1}; sc(chs);
            if (!d.channels) d.channels = []; d.channels.push(nid);
        } else {
            var grs = gg(); grs[nid] = {id:nid,name:n,desc:document.getElementById('cdesc').value.trim(),creatorId:U.id,members:1}; sg(grs);
            if (!d.groups) d.groups = []; d.groups.push(nid);
        }
        if (!d.messages) d.messages = {}; d.messages[nid] = [];
        smd(d); hideCreate(); rc();
        toast((type==='channel'?'📢 Канал':'👥 Группа')+' создан!');
    };

    // ===== PREMIUM =====
    function showPrem() { document.getElementById('premModal').style.display='flex'; updatePremBtns(); }
    function hidePrem() { document.getElementById('premModal').style.display='none'; }
    function updatePremBtns() {
        document.getElementById('actPrem').style.display = (U&&U.premium)?'none':'block';
        document.getElementById('cancelPrem').style.display = (U&&U.premium)?'block':'none';
    }
    window.activatePrem = function() {
        if (!U) return;
        var users = gu(); users[U.id].premium = true; su(users); U.premium = true;
        hidePrem(); premAnim(); rp(); toast('⭐ Premium активирован!');
    };
    window.cancelPrem = function() {
        if (!U) return;
        if (confirm('Отменить Premium?')) {
            var users = gu(); users[U.id].premium = false; su(users); U.premium = false;
            hidePrem(); rp(); toast('Premium отменён');
        }
    };

    // ===== АВАТАР =====
    document.getElementById('afile').addEventListener('change', function(e){
        var f = e.target.files[0]; if (!f) return;
        var r = new FileReader();
        r.onload = function(ev) {
            U.avatar = ev.target.result;
            var users = gu(); users[U.id].avatar = U.avatar; su(users);
            rp(); toast('📷 Фото обновлено!');
        };
        r.readAsDataURL(f);
    });

    // ===== ВХОД =====
    function doLogin() {
        var email = document.getElementById('lemail').value.trim().toLowerCase();
        var pass = document.getElementById('lpass').value.trim();
        if (!email || pass.length < 3) { toast('Заполните поля'); return; }
        var users = gu();
        var u = users[email];
        if (u && u.password === pass) {
            U = u; ss(U);
            document.getElementById('loginModal').style.display = 'none';
            go('chats'); toast('👋 Добро пожаловать, '+U.name+'!');
        } else { toast('❌ Неверные данные'); }
    }

    // ===== BC =====
    BC.onmessage = function(e) {
        var d = e.data; if (!U) return;
        if (d.type==='msg') {
            var data = md(); if (!data.messages) data.messages = {};
            var target = null;
            if (d.chatType==='personal' && d.to===U.id) {
                target = d.from;
                if (!data.contacts) data.contacts = [];
                if (data.contacts.indexOf(d.from)===-1) data.contacts.push(d.from);
            } else if ((d.chatType==='channel'||d.chatType==='group') && d.from!==U.id) {
                var my = (d.chatType==='channel'?data.channels:data.groups)||[];
                if (my.indexOf(d.to)!==-1) target = d.to;
            }
            if (target && d.from!==U.id) {
                if (!data.messages[target]) data.messages[target] = [];
                data.messages[target].push({text:d.msg.text,time:d.msg.time,out:false,read:false,sender:d.msg.sender});
                smd(data);
                if (active===target) { var chats = allChats(); var c = chats.find(function(x){return x.id===target;}); if (c) rm(c); }
                rc();
            }
        }
    };

    // ===== АВТО-ВХОД =====
    (function(){
        var s = gs();
        if (s) {
            var users = gu();
            if (users[s.id] && users[s.id].password === s.password) {
                U = users[s.id];
                go('chats');
                return;
            }
        }
        document.getElementById('loginModal').style.display = 'flex';
    })();

    go('chats');
    console.log('🚀 FuruGram v15.0 — Полная версия с Telegram-дизайном');
})();
</script>
</body>
</html>
