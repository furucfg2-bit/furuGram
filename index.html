<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff; --surface: #ffffff; --surface2: #f0f2f5; --surface3: #e4e6eb;
            --chat-bg: #ffffff; --accent: #3390ec; --premium: #d4a843; --text: #000000;
            --text-secondary: #707579; --text-muted: #8d9298; --border: #e0e0e0;
            --hover: #f0f2f5; --bubble-out: #f0f2f5; --bubble-in: #3390ec;
            --online: #4caf50; --danger: #e53935; --safe-bottom: env(safe-area-inset-bottom, 0px);
            --chat-theme: #ffffff; --chat-text: #000000;
        }
        .dark {
            --bg: #18222e; --surface: #1c2838; --surface2: #212e3e; --surface3: #263444;
            --chat-bg: #18222e; --accent: #5b8cce; --text: #e9e9e9;
            --text-secondary: #8a9bb0; --text-muted: #5e6e80; --border: #253040;
            --hover: #212e3e; --bubble-out: #212e3e; --bubble-in: #2b5278;
        }
        .theme-green { --chat-theme: #e8f5e9; --chat-text: #1b5e20; }
        .theme-red { --chat-theme: #ffebee; --chat-text: #b71c1c; }
        .theme-purple { --chat-theme: #f3e5f5; --chat-text: #4a148c; }
        .theme-blue { --chat-theme: #e3f2fd; --chat-text: #0d47a1; }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; color: var(--text); overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .app { width:100%; max-width:1100px; height:100vh; height:100dvh; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }
        @media(min-width:769px){.app{height:94vh;border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,0.08);}}

        .header { height:56px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .header-title { font-size:1.25rem; font-weight:600; color:var(--text); }
        .hbtn { width:36px; height:36px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .hbtn:active { background:var(--hover); transform:scale(0.9); }

        .content { flex-grow:1; display:flex; overflow:hidden; position:relative; }
        .sidebar { width:100%; background:var(--surface); display:flex; flex-direction:column; position:absolute; inset:0; z-index:5; transition:transform 0.3s; }
        @media(min-width:769px){.sidebar{width:350px;min-width:350px;max-width:350px;position:relative;border-right:1px solid var(--border);}}
        .sidebar.hide{transform:translateX(-100%);} @media(min-width:769px){.sidebar.hide{transform:none;}}

        .search-box { margin:8px 12px; position:relative; }
        .search-box input { width:100%; padding:10px 10px 10px 38px; background:var(--surface2); border:2px solid transparent; border-radius:24px; color:var(--text); font-size:0.9rem; outline:none; transition:0.2s; }
        .search-box input:focus { border-color:var(--accent); background:var(--surface); }
        .search-box i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); }

        .chat-list { flex-grow:1; overflow-y:auto; }
        .chat-item { display:flex; align-items:center; gap:12px; padding:10px 14px; cursor:pointer; transition:0.15s; border-left:3px solid transparent; }
        .chat-item:active { background:var(--hover); }
        .chat-item.active { background:var(--hover); border-left-color:var(--accent); }
        .avatar { width:48px; height:48px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.2rem; color:white; flex-shrink:0; overflow:hidden; position:relative; background-size:cover; background-position:center; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .avatar.sm { width:40px; height:40px; font-size:0.9rem; }
        .avatar.lg { width:80px; height:80px; font-size:2.2rem; }
        .avatar.pr { border:3px solid var(--premium); box-shadow:0 0 16px rgba(212,168,67,0.4); }
        .online-dot { position:absolute; bottom:2px; right:2px; width:12px; height:12px; background:var(--online); border-radius:50%; border:3px solid var(--surface); }
        .cbody { flex-grow:1; min-width:0; }
        .cname { font-weight:500; font-size:0.95rem; }
        .cpreview { font-size:0.82rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

        .chat-area { flex-grow:1; display:flex; flex-direction:column; background:var(--chat-theme); }
        .chat-head { height:56px; padding:0 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--surface); }
        .back-btn { width:34px; height:34px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer; display:none; align-items:center; justify-content:center; }
        @media(max-width:768px){.back-btn{display:flex;}}
        .msgs { flex-grow:1; padding:12px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
        .msg { display:flex; max-width:75%; animation:msgIn 0.25s; }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .msg.out { align-self:flex-end; }
        .mbub { padding:9px 13px; border-radius:18px; font-size:0.93rem; line-height:1.4; word-break:break-word; }
        .msg.in .mbub { background:var(--bubble-out); border-bottom-left-radius:6px; color:var(--text); }
        .msg.out .mbub { background:var(--bubble-in); color:white; border-bottom-right-radius:6px; }
        .mtime { font-size:0.62rem; opacity:0.6; text-align:right; margin-top:3px; }
        .dsep { text-align:center; margin:10px 0; font-size:0.72rem; color:var(--text-muted); }
        .dsep span { background:var(--chat-theme); padding:3px 12px; border-radius:10px; border:1px solid var(--border); }

        .input-row { padding:8px 12px; padding-bottom:calc(8px + var(--safe-bottom)); border-top:1px solid var(--border); display:flex; align-items:center; gap:6px; background:var(--surface); }
        .input-row input { flex-grow:1; padding:9px 14px; background:var(--surface2); border:2px solid transparent; border-radius:24px; color:var(--text); font-size:0.92rem; outline:none; }
        .input-row input:focus { border-color:var(--accent); }
        .send-btn { width:40px; height:40px; border-radius:50%; background:var(--accent); border:none; color:white; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .send-btn:active { transform:scale(0.9); }

        .empty { flex-grow:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--text-secondary); gap:12px; }
        .page { position:absolute; inset:0; background:var(--bg); z-index:6; overflow-y:auto; display:none; }
        .page.show { display:block; }

        /* PROFILE */
        .prof-cover { height:140px; background:linear-gradient(135deg,var(--accent),#6ab0f3,#a0c4ff); position:relative; }
        .prof-av-wrap { position:absolute; bottom:-40px; left:20px; }
        .prof-av-lg { width:80px; height:80px; border-radius:50%; background:var(--accent); border:4px solid var(--surface); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; color:white; overflow:hidden; background-size:cover; background-position:center; cursor:pointer; transition:0.2s; }
        .prof-av-lg:hover { transform:scale(1.05); }
        .prof-av-lg img { width:100%; height:100%; object-fit:cover; }
        .prof-info { padding:50px 20px 16px; }
        .prof-name-lg { font-size:1.3rem; font-weight:600; }
        .prof-uname-lg { color:var(--text-secondary); font-size:0.9rem; }
        .prof-bio-lg { color:var(--text); font-size:0.9rem; margin-top:8px; }
        .prof-stats-row { display:flex; gap:24px; margin-top:14px; }
        .pstat { text-align:center; cursor:pointer; }
        .pstat-num { font-weight:600; font-size:1.15rem; }
        .pstat-lbl { font-size:0.72rem; color:var(--text-muted); }

        .gifts-row { display:flex; gap:8px; padding:0 20px; flex-wrap:wrap; margin-bottom:12px; }
        .gift-item { background:var(--surface2); border-radius:12px; padding:8px 12px; text-align:center; font-size:1.5rem; cursor:pointer; transition:0.2s; border:2px solid transparent; }
        .gift-item:hover { border-color:var(--accent); transform:translateY(-2px); }

        .psec { margin:8px 0; background:var(--surface); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
        .psec-title { padding:14px 16px 6px; font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; }
        .pitem { display:flex; align-items:center; padding:14px 16px; cursor:pointer; color:var(--text); font-size:0.95rem; gap:14px; border-bottom:1px solid var(--border); transition:0.15s; }
        .pitem:last-child { border-bottom:none; }
        .pitem:active { background:var(--hover); }
        .pitem i { width:22px; text-align:center; font-size:1rem; color:var(--text-secondary); }
        .pitem .pv { color:var(--text-secondary); font-size:0.88rem; margin-left:auto; }
        .pitem.danger { color:var(--danger); }

        .sitem { display:flex; align-items:center; padding:14px 16px; cursor:pointer; color:var(--text); font-size:0.95rem; gap:14px; border-bottom:1px solid var(--border); transition:0.15s; }
        .sitem:active { background:var(--hover); }
        .sitem i { width:22px; text-align:center; color:var(--text-secondary); }
        .sitem .sv { color:var(--text-muted); font-size:0.88rem; margin-left:auto; }

        .nav { height:56px; display:flex; background:var(--surface); border-top:1px solid var(--border); padding-bottom:var(--safe-bottom); }
        .ni { flex:1; display:flex; flex-direction:column; align-items:center; padding:6px 0; cursor:pointer; color:var(--text-secondary); border:none; background:transparent; font-size:0.6rem; gap:3px; transition:0.2s; }
        .ni i { font-size:1.3rem; }
        .ni.active { color:var(--accent); }

        .login-screen { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px 24px; width:100%; max-width:380px; box-shadow:0 8px 32px rgba(0,0,0,0.1); }
        .field { margin-bottom:14px; }
        .field label { display:block; font-size:0.8rem; color:var(--text-secondary); margin-bottom:5px; font-weight:500; }
        .field input { width:100%; padding:13px 14px; background:var(--surface2); border:2px solid transparent; border-radius:10px; color:var(--text); font-size:0.95rem; outline:none; transition:0.2s; }
        .field input:focus { border-color:var(--accent); background:var(--surface); }
        .btn { width:100%; padding:14px; border:none; border-radius:10px; font-weight:600; font-size:0.95rem; cursor:pointer; margin-top:8px; transition:0.2s; }
        .btn:active { transform:scale(0.97); }
        .btn-p { background:var(--accent); color:white; }
        .btn-o { background:transparent; color:var(--accent); }
        .err { color:var(--danger); font-size:0.8rem; text-align:center; margin-top:6px; display:none; }
        .err.show { display:block; }
        .ok { color:#4caf50; font-size:0.8rem; text-align:center; margin-top:6px; display:none; }
        .ok.show { display:block; }

        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--surface3); color:var(--text); padding:10px 20px; border-radius:24px; font-size:0.85rem; z-index:250; pointer-events:none; border:1px solid var(--border); animation:tIn 0.3s,tOut 0.3s 2.2s forwards; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes tOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-10px);} }

        .prem-overlay { position:fixed; inset:0; z-index:300; pointer-events:none; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); }
        .prem-anim { text-align:center; animation:premBoom 2s ease-out forwards; }
        .prem-anim .st { font-size:6rem; animation:starSpin 0.5s ease-in-out 4; }
        .prem-anim .tx { font-size:1.8rem; font-weight:700; color:#f0c860; margin-top:12px; text-shadow:0 0 20px rgba(240,200,96,0.8); }
        @keyframes premBoom { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.2);opacity:1} 100%{transform:scale(2);opacity:0} }
        @keyframes starSpin { 0%,100%{transform:rotate(0)scale(1)} 50%{transform:rotate(180deg)scale(1.6)} }

        .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:400; display:flex; align-items:flex-end; justify-content:center; }
        .modal-card { background:var(--surface); border-radius:16px 16px 0 0; padding:24px 20px; width:100%; max-width:500px; max-height:70vh; overflow-y:auto; }

        @media(max-width:768px){.prof-cover{height:110px;}.prof-av-lg{width:70px;height:70px;font-size:1.6rem;bottom:-35px;}}
    </style>
</head>
<body class="light">

<div class="app" id="app">
    <div class="header"><div class="header-title" id="ht">FuruGram</div><div class="header-actions"><button class="hbtn" onclick="showCreate()"><i class="fas fa-plus"></i></button><button class="hbtn" onclick="showPrem()" style="color:var(--premium);"><i class="fas fa-star"></i></button></div></div>
    <div class="content">
        <div class="sidebar" id="sidebar"><div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Поиск..." id="searchInput"></div><div class="chat-list" id="chatList"></div></div>
        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState"><i class="fas fa-comments" style="font-size:3.5rem;opacity:0.12;"></i><h3>FuruGram</h3><p id="emptyText">Выберите чат</p></div>
            <div class="chat-head" id="chatHead" style="display:none;"><button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button><div class="avatar sm" id="chatAv">A</div><div><div style="font-weight:500;" id="chatNm"></div><div style="font-size:0.75rem;color:var(--text-secondary);" id="chatSt"></div></div></div>
            <div class="msgs" id="messages" style="display:none;"></div>
            <div class="input-row" id="inputRow" style="display:none;"><input type="text" placeholder="Сообщение..." id="msgInput"><button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button></div>
        </div>
        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>
    <div class="nav">
        <button class="ni active" data-p="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
        <button class="ni" data-p="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></button>
        <button class="ni" data-p="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
        <button class="ni" data-p="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>
</div>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2 style="text-align:center;font-size:1.5rem;margin-bottom:4px;">🔐 FuruGram</h2>
        <p style="text-align:center;color:var(--text-secondary);margin-bottom:20px;" id="loginSub">Войдите в аккаунт</p>
        <div class="field"><label>Email</label><input type="email" id="lemail" placeholder="your@email.com"></div>
        <div class="field" id="nameField" style="display:none;"><label>Имя</label><input type="text" id="lname" placeholder="Ваше имя"></div>
        <div class="field"><label>Пароль</label><input type="password" id="lpass" placeholder="••••••"></div>
        <div class="err" id="lerr"></div><div class="ok" id="lok"></div>
        <button class="btn btn-p" id="loginBtn" onclick="handleAuth()">🚀 Войти</button>
        <button class="btn btn-o" id="switchBtn" onclick="toggleMode()">✨ Создать аккаунт</button>
        <button class="btn btn-o" onclick="switchLang()" style="font-size:0.85rem;">🌐 English</button>
    </div>
</div>

<div id="createModal" style="display:none;" class="modal-bg"><div class="modal-card"><h3 style="text-align:center;margin-bottom:16px;">✨ Создать</h3><div class="field"><label>Название</label><input type="text" id="cname"></div><button class="btn btn-p" onclick="doCreate('channel')" style="width:100%;">📢 Канал</button><button class="btn" onclick="doCreate('group')" style="width:100%;background:#4caf50;color:white;margin-top:6px;">👥 Группа</button><button class="btn btn-o" onclick="hideCreate()" style="width:100%;">Отмена</button></div></div>

<div id="premModal" style="display:none;" class="modal-bg"><div class="modal-card"><h3 style="text-align:center;">⭐ FuruGram Premium</h3><p style="text-align:center;color:var(--text-secondary);">Эксклюзивные возможности</p><div style="text-align:left;color:var(--text-secondary);font-size:0.85rem;line-height:2;margin:12px 0;">✅ Золотая рамка<br>✅ Эксклюзивные стикеры<br>✅ Приоритетная поддержка</div><button class="btn" onclick="activatePrem()" style="width:100%;background:linear-gradient(135deg,#d4a843,#f0c860);color:#1a1a2e;font-weight:700;">Активировать бесплатно</button><button class="btn" onclick="cancelPrem()" id="cancelPremBtn" style="width:100%;background:var(--danger);color:white;display:none;margin-top:6px;">Отменить Premium</button><button class="btn btn-o" onclick="hidePrem()" style="width:100%;">Закрыть</button></div></div>

<div id="giftShopModal" style="display:none;" class="modal-bg"><div class="modal-card"><h3 style="text-align:center;">🎁 Магазин подарков</h3><p style="text-align:center;color:var(--text-secondary);">Ваши звёзды: <b id="starsCount">0</b> ⭐</p><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0;"><div onclick="buyGift('🧸','Мишка',15)" style="background:var(--surface2);border-radius:12px;padding:14px;text-align:center;cursor:pointer;flex:1;min-width:80px;"><div style="font-size:2rem;">🧸</div><div>Мишка</div><div style="color:var(--premium);">15 ⭐</div></div><div onclick="buyGift('💝','Сердце',15)" style="background:var(--surface2);border-radius:12px;padding:14px;text-align:center;cursor:pointer;flex:1;min-width:80px;"><div style="font-size:2rem;">💝</div><div>Сердце</div><div style="color:var(--premium);">15 ⭐</div></div><div onclick="buyGift('🌹','Роза',25)" style="background:var(--surface2);border-radius:12px;padding:14px;text-align:center;cursor:pointer;flex:1;min-width:80px;"><div style="font-size:2rem;">🌹</div><div>Роза</div><div style="color:var(--premium);">25 ⭐</div></div><div onclick="buyGift('🎁','Подарочек',25)" style="background:var(--surface2);border-radius:12px;padding:14px;text-align:center;cursor:pointer;flex:1;min-width:80px;"><div style="font-size:2rem;">🎁</div><div>Подарочек</div><div style="color:var(--premium);">25 ⭐</div></div></div><button class="btn btn-o" onclick="hideGiftShop()" style="width:100%;">Закрыть</button></div></div>

<input type="file" id="avatarInput" accept="image/*" style="display:none;">

<script>
(function(){
var US='fg21u',DB='fg21d',CH='fg21ch',GR='fg21gr',SS='fg21s',BC=new BroadcastChannel('fg21');
