<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#18222e">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #18222e;
            --surface: #1c2838;
            --surface2: #212e3e;
            --accent: #5b8cce;
            --text: #e9e9e9;
            --text-secondary: #8a9bb0;
            --text-muted: #5e6e80;
            --border: #253040;
            --hover: #212e3e;
            --online: #4caf50;
            --danger: #e74c3c;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #141c26;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            color: var(--text);
            overflow: hidden;
        }
        .app {
            width: 100%; max-width: 1100px; height: 100vh; height: 100dvh;
            background: var(--bg); display: flex; flex-direction: column; overflow: hidden;
        }

        /* LOGIN SCREEN */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 999;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 30px 24px; width: 100%; max-width: 360px;
        }
        .login-card h2 { text-align: center; font-size: 1.4rem; margin-bottom: 4px; }
        .login-card .sub { text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; }
        
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; }
        .field input {
            width: 100%; padding: 12px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .field input:focus { border-color: var(--accent); }
        
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 8px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 8px;
        }
        .btn-p { background: var(--accent); color: white; }
        .btn-g { background: #4caf50; color: white; }
        .btn-o { background: transparent; color: var(--text-secondary); }
        
        .err { color: var(--danger); font-size: 0.78rem; text-align: center; margin-top: 6px; display: none; }
        .err.show { display: block; }
        .msg-ok { color: #4caf50; font-size: 0.78rem; text-align: center; margin-top: 6px; display: none; }
        .msg-ok.show { display: block; }

        /* HEADER */
        .header {
            padding: 14px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .header-title { font-size: 1.25rem; font-weight: 600; }

        .content { flex-grow:1; display:flex; overflow:hidden; position:relative; }

        /* SIDEBAR */
        .sidebar {
            width:100%; background:var(--bg); display:flex; flex-direction:column;
            position:absolute; inset:0; z-index:5;
        }
        @media(min-width:769px){ .sidebar{width:340px;min-width:340px;max-width:340px;position:relative;border-right:1px solid var(--border);} }
        .sidebar.hide{display:none;}
        @media(min-width:769px){.sidebar.hide{display:flex;}}

        .search-box{margin:8px 10px;position:relative;}
        .search-box input{width:100%;padding:10px 10px 10px 36px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.9rem;outline:none;}
        .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

        .chat-list{flex-grow:1;overflow-y:auto;}
        .chat-item{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;border-left:3px solid transparent;}
        .chat-item:active{background:var(--hover);}
        .chat-item.active{background:var(--hover);border-left-color:var(--accent);}

        .avatar{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;color:white;flex-shrink:0;overflow:hidden;position:relative;}
        .avatar img{width:100%;height:100%;object-fit:cover;}
        .avatar.sm{width:38px;height:38px;font-size:0.9rem;}
        .online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--online);border-radius:50%;border:2px solid var(--bg);}

        .cbody{flex-grow:1;min-width:0;}
        .cname{font-weight:500;font-size:0.95rem;}
        .cpreview{font-size:0.82rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}

        /* CHAT */
        .chat-area{flex-grow:1;display:flex;flex-direction:column;background:var(--bg);}
        .chat-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);}
        .back-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;color:var(--text-secondary);font-size:1.05rem;cursor:pointer;display:none;align-items:center;justify-content:center;}
        @media(max-width:768px){.back-btn{display:flex;}}

        .msgs{flex-grow:1;padding:14px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
        .msg{display:flex;max-width:75%;}
        .msg.out{align-self:flex-end;}
        .mbub{padding:9px 13px;border-radius:12px;font-size:0.93rem;line-height:1.42;word-break:break-word;}
        .msg.in .mbub{background:#212e3e;border-bottom-left-radius:4px;}
        .msg.out .mbub{background:#2b5278;color:white;border-bottom-right-radius:4px;}
        .mtime{font-size:0.65rem;opacity:0.5;text-align:right;margin-top:4px;}

        .input-row{padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface);}
        .input-row input{flex-grow:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:0.92rem;outline:none;}
        .sbtn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

        .empty{flex-grow:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text-secondary);gap:10px;text-align:center;padding:20px;}

        /* PAGES */
        .page{position:absolute;inset:0;background:var(--bg);z-index:6;overflow-y:auto;display:none;}
        .page.show{display:block;}

        /* PROFILE */
        .prof-top{padding:24px 16px;text-align:center;background:var(--surface);border-bottom:1px solid var(--border);}
        .prof-av{width:76px;height:76px;border-radius:50%;background:var(--accent);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:700;color:white;}
        .prof-name{font-size:1.35rem;font-weight:600;}
        .prof-uname{color:var(--text-secondary);font-size:0.9rem;margin-top:2px;}
        .psec{margin:10px 0;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
        .pitem{display:flex;align-items:center;padding:14px 16px;cursor:pointer;color:var(--text);font-size:0.95rem;gap:14px;border-bottom:1px solid var(--border);}
        .pitem:last-child{border-bottom:none;}
        .pitem:active{background:var(--hover);}
        .pitem i{width:22px;text-align:center;font-size:1rem;color:var(--text-secondary);}
        .pitem .pv{color:var(--text-secondary);font-size:0.88rem;margin-left:auto;}
        .pitem.danger{color:var(--danger);}
        .pitem.danger i{color:var(--danger);}

        /* NAV */
        .nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;}
        .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0;cursor:pointer;color:var(--text-secondary);border:none;background:transparent;font-size:0.62rem;gap:4px;}
        .ni i{font-size:1.25rem;}
        .ni.active{color:var(--accent);}

        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);color:white;padding:10px 20px;border-radius:22px;font-size:0.85rem;z-index:250;pointer-events:none;animation:tIn 0.3s,tOut 0.3s 2.2s forwards;white-space:nowrap;border:1px solid var(--border);}
        @keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
        @keyframes tOut{from{opacity:1;}to{opacity:0;transform:translateX(-50%) translateY(-10px);}}
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <div class="header-title" id="ht">FuruGram</div>
    </div>
    <div class="content">
        <div class="sidebar" id="sidebar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Поиск контактов..." id="searchInput" autocomplete="off">
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState">
                <div style="font-size:3rem;opacity:0.15;">💬</div>
                <h3>FuruGram</h3>
                <p>Войдите в аккаунт чтобы начать</p>
            </div>
            <div class="chat-head" id="chatHead" style="display:none;">
                <button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
                <div class="avatar sm" id="chatAv">A</div>
                <div><div class="cname" id="chatNm"></div><div style="font-size:0.75rem;color:var(--text-secondary);" id="chatSt"></div></div>
            </div>
            <div class="msgs" id="messages" style="display:none;"></div>
            <div class="input-row" id="inputRow" style="display:none;">
                <input type="text" placeholder="Сообщение..." id="msgInput" autocomplete="off">
                <button class="sbtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>
    <div class="nav">
        <button class="ni active" data-p="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
        <button class="ni" data-p="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></button>
        <button class="ni" data-p="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
        <button class="ni" data-p="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>
</div>

<!-- ЭКРАН ВХОДА -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🔐 FuruGram</h2>
        <p class="sub" id="loginSub">Войдите в аккаунт</p>
        
        <div class="field">
            <label>Email</label>
            <input type="email" id="lemail" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field" id="nameField" style="display:none;">
            <label>Имя</label>
            <input type="text" id="lname" placeholder="Ваше имя">
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="lpass" placeholder="••••••" autocomplete="current-password">
        </div>
        
        <div class="err" id="lerr"></div>
        <div class="msg-ok" id="lok"></div>
        
        <button class="btn btn-p" id="loginBtn" onclick="handleAuth()">🚀 Войти</button>
        <button class="btn btn-o" id="switchBtn" onclick="toggleMode()">✨ Создать аккаунт</button>
    </div>
</div>

<script>
(function() {
    // ===== ПРОВЕРКА ДОСТУПНОСТИ LOCALSTORAGE =====
    var storageAvailable = false;
    try {
        localStorage.setItem('__test__', '1');
        localStorage.removeItem('__test__');
        storageAvailable = true;
    } catch(e) {
        storageAvailable = false;
    }
    console.log('LocalStorage доступен:', storageAvailable);

    // ===== КЛЮЧИ =====
    var US = 'fg17_users';
    var DB = 'fg17_data';
    var SS = 'fg17_session';

    function gu() {
        try { return JSON.parse(localStorage.getItem(US) || '{}'); }
        catch(e) { return {}; }
    }
    function su(v) {
        try { localStorage.setItem(US, JSON.stringify(v)); return true; }
        catch(e) { return false; }
    }
    function gd() {
        try { return JSON.parse(localStorage.getItem(DB) || '{}'); }
        catch(e) { return {}; }
    }
    function sd(v) {
        try { localStorage.setItem(DB, JSON.stringify(v)); return true; }
        catch(e) { return false; }
    }
    function gs() {
        try { return JSON.parse(localStorage.getItem(SS) || 'null'); }
        catch(e) { return null; }
    }
    function ss(v) {
        try { localStorage.setItem(SS, JSON.stringify(v)); return true; }
        catch(e) { return false; }
    }

    var U = null;
    var active = null;
    var page = 'chats';
    var isRegister = false;

    function toast(m) {
        var t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
        document.body.appendChild(t); setTimeout(function(){t.remove();},2500);
    }

    function md() {
        if (!U) return {contacts:[],messages:{}};
        var d = gd();
        return d[U.id] || {contacts:[],messages:{}};
    }
    function smd(v) { var d = gd(); d[U.id] = v; sd(d); }

    function addContact(cid) {
        var d = md();
        if (!d.contacts) d.contacts = [];
        if (d.contacts.indexOf(cid) === -1) {
            d.contacts.push(cid);
            if (!d.messages) d.messages = {};
            if (!d.messages[cid]) d.messages[cid] = [];
            smd(d);
            return true;
        }
        return false;
    }

    // ===== РЕЖИМ ВХОД/РЕГИСТРАЦИЯ =====
    window.toggleMode = function() {
        isRegister = !isRegister;
        document.getElementById('loginSub').textContent = isRegister ? 'Создайте аккаунт' : 'Войдите в аккаунт';
        document.getElementById('loginBtn').textContent = isRegister ? '✨ Зарегистрироваться' : '🚀 Войти';
        document.getElementById('switchBtn').textContent = isRegister ? 'У меня есть аккаунт' : '✨ Создать аккаунт';
        document.getElementById('nameField').style.display = isRegister ? 'block' : 'none';
        document.getElementById('lerr').classList.remove('show');
        document.getElementById('lok').classList.remove('show');
    };

    // ===== АВТОРИЗАЦИЯ =====
    window.handleAuth = function() {
        var email = document.getElementById('lemail').value.trim().toLowerCase();
        var pass = document.getElementById('lpass').value.trim();
        var name = document.getElementById('lname').value.trim();
        var err = document.getElementById('lerr');
        var ok = document.getElementById('lok');
        
        err.classList.remove('show');
        ok.classList.remove('show');

        // Проверки
        if (!email || !pass) {
            err.textContent = '❌ Заполните все поля';
            err.classList.add('show');
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            err.textContent = '❌ Введите корректный email';
            err.classList.add('show');
            return;
        }
        if (pass.length < 3) {
            err.textContent = '❌ Пароль минимум 3 символа';
            err.classList.add('show');
            return;
        }
        if (isRegister && !name) {
            err.textContent = '❌ Введите имя';
            err.classList.add('show');
            return;
        }

        var users = gu();

        if (isRegister) {
            // РЕГИСТРАЦИЯ
            if (users[email]) {
                err.textContent = '❌ Этот email уже зарегистрирован';
                err.classList.add('show');
                return;
            }

            // Создаём юзернейм
            var uname = email.split('@')[0].replace(/[^a-z0-9_]/g, '_');
            var exists = false;
            for (var id in users) {
                if (users[id].username === uname) { exists = true; break; }
            }
            if (exists) uname += '_' + Math.random().toString(36).substr(2, 4);

            // Сохраняем пользователя
            users[email] = {
                id: email,
                name: name,
                username: uname,
                password: pass,
                avatar: '',
                online: true,
                premium: false,
                bio: '',
                phone: '',
                birthday: ''
            };

            if (!su(users)) {
                err.textContent = '❌ Ошибка сохранения. Попробуйте другой браузер.';
                err.classList.add('show');
                return;
            }

            U = users[email];
            ss(U);
            
            ok.textContent = '✅ Аккаунт создан! Ваш юзернейм: @' + uname;
            ok.classList.add('show');
            
            setTimeout(function() {
                document.getElementById('loginScreen').style.display = 'none';
                go('chats');
                toast('🎉 Добро пожаловать, ' + name + '!');
            }, 1000);

        } else {
            // ВХОД
            var u = users[email];
            
            if (!u) {
                err.textContent = '❌ Аккаунт не найден. Создайте новый.';
                err.classList.add('show');
                return;
            }
            
            if (u.password !== pass) {
                err.textContent = '❌ Неверный пароль';
                err.classList.add('show');
                return;
            }

            U = u;
            U.online = true;
            su(users);
            ss(U);
            
            ok.textContent = '✅ Вход выполнен!';
            ok.classList.add('show');
            
            setTimeout(function() {
                document.getElementById('loginScreen').style.display = 'none';
                go('chats');
                toast('👋 С возвращением, ' + U.name + '!');
            }, 500);
        }
    };

    // ===== НАВИГАЦИЯ =====
    function go(p) {
        page = p;
        document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
        var ni = document.querySelector('[data-p="'+p+'"]');
        if (ni) ni.classList.add('active');
        
        document.getElementById('sidebar').classList.toggle('hide', p !== 'chats');
        document.getElementById('contactsPage').classList.toggle('show', p === 'contacts');
        document.getElementById('profilePage').classList.toggle('show', p === 'profile');
        document.getElementById('settingsPage').classList.toggle('show', p === 'settings');
        
        if (p === 'chats') rc();
        if (p === 'contacts') rco();
        if (p === 'profile') rp();
        if (p === 'settings') rs();
        
        document.getElementById('ht').textContent = p==='chats'?'FuruGram':p==='contacts'?'Контакты':p==='profile'?'Профиль':'Настройки';
    }

    document.querySelectorAll('.ni').forEach(function(n){n.addEventListener('click',function(){go(n.dataset.p);});});

    // ===== ЧАТЫ =====
    function rc() {
        if (!U) return;
        var d = md(), users = gu();
        var contacts = (d.contacts||[]).map(function(cid){return users[cid];}).filter(Boolean);
        var el = document.getElementById('chatList');
        el.innerHTML = '';
        if (contacts.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Нет чатов.<br>Добавьте контакты через поиск 🔍</div>';
            return;
        }
        contacts.forEach(function(c){
            var div = document.createElement('div');
            div.className = 'chat-item' + (active===c.id?' active':'');
            div.onclick = function(){ openChat(c); };
            div.innerHTML = 
                '<div class="avatar">'+(c.avatar?'<img src="'+c.avatar+'">':c.name.charAt(0))+(c.online?'<span class="online-dot"></span>':'')+'</div>'+
                '<div class="cbody"><div class="cname">'+c.name+'</div><div class="cpreview">Нажмите для чата</div></div>';
            el.appendChild(div);
        });
    }

    function openChat(c) {
        active = c.id;
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatHead').style.display = 'flex';
        document.getElementById('messages').style.display = 'flex';
        document.getElementById('inputRow').style.display = 'flex';
        document.getElementById('chatNm').textContent = c.name;
        document.getElementById('chatAv').innerHTML = c.avatar ? '<img src="'+c.avatar+'">' : c.name.charAt(0);
        document.getElementById('chatSt').innerHTML = '<span style="color:#4caf50;">●</span> онлайн';
        document.getElementById('messages').innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px;">Начните переписку!</div>';
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hide');
    }

    function closeChat() {
        active = null;
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('chatHead').style.display = 'none';
        document.getElementById('messages').style.display = 'none';
        document.getElementById('inputRow').style.display = 'none';
        document.getElementById('sidebar').classList.remove('hide');
    }

    function sendMsg() {
        var text = document.getElementById('msgInput').value.trim();
        if (!text || !active) return;
        var el = document.getElementById('messages');
        var time = new Date().toLocaleTimeString().slice(0,5);
        el.innerHTML += '<div class="msg out"><div class="mbub">'+text+'<div class="mtime">'+time+'</div></div></div>';
        document.getElementById('msgInput').value = '';
        el.scrollTop = el.scrollHeight;
    }

    document.getElementById('msgInput').addEventListener('keypress',function(e){if(e.key==='Enter')sendMsg();});

    // ===== КОНТАКТЫ =====
    function rco() {
        if (!U) return;
        var d = md(), users = gu();
        var contacts = (d.contacts||[]).map(function(cid){return users[cid];}).filter(Boolean);
        var el = document.getElementById('contactsPage');
        el.innerHTML = contacts.length === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Нет контактов</div>' : '';
        contacts.forEach(function(c){
            var div = document.createElement('div');
            div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;';
            div.innerHTML = '<div class="avatar sm">'+(c.avatar?'<img src="'+c.avatar+'">':c.name.charAt(0))+'</div><div><div style="font-weight:500;">'+c.name+'</div><div style="font-size:0.8rem;color:var(--text-secondary);">@'+c.username+'</div></div>';
            div.onclick = function(){go('chats');setTimeout(function(){openChat(c);},100);};
            el.appendChild(div);
        });
    }

    // ===== ПРОФИЛЬ =====
    function rp() {
        if (!U) return;
        var el = document.getElementById('profilePage');
        el.innerHTML = 
            '<div class="prof-top">'+
            '<div class="prof-av">'+(U.avatar?'<img src="'+U.avatar+'">':U.name.charAt(0).toUpperCase())+'</div>'+
            '<div class="prof-name">'+U.name+'</div>'+
            '<div class="prof-uname">@'+U.username+'</div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="pitem" onclick="editF(\'name\')"><i class="fas fa-user"></i>Имя<span class="pv">'+U.name+'</span></div>'+
            '<div class="pitem" onclick="editF(\'username\')"><i class="fas fa-at"></i>Юзернейм<span class="pv">@'+U.username+'</span></div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="pitem danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Выйти</div>'+
            '</div>';
    }

    window.editF = function(field) {
        var labels = {name:'Имя',username:'Юзернейм'};
        var values = {name:U.name,username:U.username};
        var nv = prompt(labels[field]+':', values[field]);
        if (!nv || !nv.trim()) return;
        nv = nv.trim();
        var users = gu();
        if (field==='name') { U.name=nv; users[U.id].name=nv; }
        else if (field==='username') {
            if (!/^[a-z0-9_]+$/.test(nv)) { toast('Только латиница, цифры, _'); return; }
            for (var id in users) { if (users[id].username===nv && id!==U.id) { toast('Занят'); return; } }
            U.username=nv; users[U.id].username=nv;
        }
        su(users); rp(); toast(labels[field]+' обновлено!');
    };

    window.logout = function() {
        U = null; active = null; ss(null);
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('lemail').value = '';
        document.getElementById('lpass').value = '';
        document.getElementById('lname').value = '';
        go('chats');
    };

    // ===== SETTINGS =====
    function rs() {
        document.getElementById('settingsPage').innerHTML = 
            '<div class="psec" style="margin-top:0;">'+
            '<div class="pitem"><i class="fas fa-bell"></i>Уведомления</div>'+
            '<div class="pitem"><i class="fas fa-palette"></i>Тема<span class="pv">Тёмная</span></div>'+
            '<div class="pitem"><i class="fas fa-info-circle"></i>Версия<span class="pv">17.0</span></div>'+
            '</div>';
    }

    // ===== ПОИСК =====
    document.getElementById('searchInput').addEventListener('input', function(){
        var q = this.value.trim().toLowerCase();
        if (q.length >= 2 && U) {
            var users = gu();
            for (var id in users) {
                if (id !== U.id && (users[id].username.toLowerCase().includes(q) || users[id].name.toLowerCase().includes(q))) {
                    if (addContact(id)) { toast('✅ '+users[id].name+' добавлен!'); rc(); }
                    break;
                }
            }
        }
    });

    // ===== АВТО-ВХОД =====
    (function(){
        var s = gs();
        if (s && s.id) {
            var users = gu();
            if (users[s.id] && users[s.id].password === s.password) {
                U = users[s.id];
                U.online = true;
                su(users);
                document.getElementById('loginScreen').style.display = 'none';
                go('chats');
                return;
            }
        }
        document.getElementById('loginScreen').style.display = 'flex';
    })();

    go('chats');
    console.log('🚀 FuruGram v17.0 готов!');
    console.log('📝 Регистрация: введите email, имя и пароль');
    console.log('🔐 Вход: введите email и пароль');
})();
</script>
</body>
</html>
