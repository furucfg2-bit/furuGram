<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff; --surface: #ffffff; --surface2: #f0f2f5; --surface3: #e4e6eb;
            --chat-bg: #ffffff; --accent: #3390ec; --accent-light: #4da3f5;
            --premium: #d4a843; --premium-light: #f0c860; --text: #000000;
            --text-secondary: #707579; --text-muted: #8d9298; --border: #e0e0e0;
            --hover: #f0f2f5; --bubble-out: #f0f2f5; --bubble-in: #3390ec;
            --online: #4caf50; --danger: #e53935; --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        .dark {
            --bg: #18222e; --surface: #1c2838; --surface2: #212e3e; --surface3: #263444;
            --chat-bg: #18222e; --accent: #5b8cce; --accent-light: #6a9bd4;
            --text: #e9e9e9; --text-secondary: #8a9bb0; --text-muted: #5e6e80;
            --border: #253040; --hover: #212e3e; --bubble-out: #212e3e; --bubble-in: #2b5278;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; color: var(--text); overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .app { width:100%; max-width:1100px; height:100vh; height:100dvh; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; }
        @media(min-width:769px){.app{height:94vh;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,0.1);}}

        .header { height:56px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        .header-title { font-size:1.2rem; font-weight:600; color:var(--text); }
        .hbtn { width:36px; height:36px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .hbtn:active { background:var(--hover); }

        .content { flex-grow:1; display:flex; overflow:hidden; position:relative; }
        .sidebar { width:100%; background:var(--surface); display:flex; flex-direction:column; position:absolute; inset:0; z-index:5; }
        @media(min-width:769px){.sidebar{width:340px;min-width:340px;max-width:340px;position:relative;border-right:1px solid var(--border);}}
        .sidebar.hide{transform:translateX(-100%);} @media(min-width:769px){.sidebar.hide{transform:none;}}

        .search-box { margin:8px 12px; position:relative; }
        .search-box input { width:100%; padding:10px 10px 10px 38px; background:var(--surface2); border:1px solid transparent; border-radius:22px; color:var(--text); font-size:0.9rem; outline:none; }
        .search-box i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); }

        .chat-list { flex-grow:1; overflow-y:auto; }
        .chat-item { display:flex; align-items:center; gap:12px; padding:10px 14px; cursor:pointer; }
        .chat-item:active { background:var(--hover); }
        .avatar { width:48px; height:48px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.2rem; color:white; flex-shrink:0; overflow:hidden; position:relative; background-size:cover; background-position:center; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .avatar.sm { width:38px; height:38px; font-size:0.9rem; }
        .avatar.lg { width:80px; height:80px; font-size:2.2rem; }
        .avatar.pr { border:2px solid var(--premium); box-shadow:0 0 12px rgba(212,168,67,0.3); }
        .online-dot { position:absolute; bottom:1px; right:1px; width:11px; height:11px; background:var(--online); border-radius:50%; border:2px solid var(--surface); }
        .cbody { flex-grow:1; min-width:0; }
        .cname { font-weight:500; font-size:0.95rem; }
        .cpreview { font-size:0.82rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
        .unread { background:var(--accent); color:white; font-size:0.7rem; padding:2px 7px; border-radius:12px; display:inline-block; margin-top:2px; min-width:20px; text-align:center; }

        .chat-area { flex-grow:1; display:flex; flex-direction:column; background:var(--chat-bg); }
        .chat-head { height:56px; padding:0 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--surface); }
        .back-btn { width:34px; height:34px; border-radius:50%; background:transparent; border:none; color:var(--text-secondary); font-size:1.1rem; cursor:pointer; display:none; align-items:center; justify-content:center; }
        @media(max-width:768px){.back-btn{display:flex;}}
        .msgs { flex-grow:1; padding:12px 14px; overflow-y:auto; display:flex; flex-direction:column; gap:3px; }
        .msg { display:flex; max-width:75%; animation:msgIn 0.2s; }
        @keyframes msgIn { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }
        .msg.out { align-self:flex-end; }
        .mbub { padding:8px 12px; border-radius:16px; font-size:0.93rem; line-height:1.4; word-break:break-word; }
        .msg.in .mbub { background:var(--bubble-out); border-bottom-left-radius:4px; }
        .msg.out .mbub { background:var(--bubble-in); color:white; border-bottom-right-radius:4px; }
        .msg-img { max-width:200px; border-radius:10px; cursor:pointer; }
        .msg-sticker { font-size:3rem; }
        .mtime { font-size:0.62rem; opacity:0.6; text-align:right; margin-top:3px; }
        .dsep { text-align:center; margin:8px 0; font-size:0.72rem; color:var(--text-muted); }
        .dsep span { background:var(--chat-bg); padding:3px 12px; border-radius:10px; border:1px solid var(--border); }

        .input-row { padding:8px 12px; padding-bottom:calc(8px + var(--safe-bottom)); border-top:1px solid var(--border); display:flex; align-items:center; gap:6px; background:var(--surface); }
        .input-row input { flex-grow:1; min-width:60px; padding:9px 14px; background:var(--surface2); border:1px solid transparent; border-radius:22px; color:var(--text); font-size:0.92rem; outline:none; }
        .send-btn { width:38px; height:38px; border-radius:50%; background:var(--accent); border:none; color:white; font-size:0.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

        .empty { flex-grow:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:var(--text-secondary); gap:8px; }
        .page { position:absolute; inset:0; background:var(--bg); z-index:6; overflow-y:auto; display:none; }
        .page.show { display:block; }

        .prof-cover { height:120px; background:linear-gradient(135deg,var(--accent),#6ab0f3); position:relative; }
        .prof-av-lg { width:80px; height:80px; border-radius:50%; background:var(--accent); border:4px solid var(--surface); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; color:white; overflow:hidden; position:absolute; bottom:-40px; left:16px; background-size:cover; background-position:center; }
        .prof-av-lg img { width:100%; height:100%; object-fit:cover; }
        .prof-info { padding:50px 16px 16px; }
        .prof-name-lg { font-size:1.3rem; font-weight:600; }
        .prof-uname-lg { color:var(--text-secondary); font-size:0.9rem; }
        .psec { margin:8px 0; background:var(--surface); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
        .pitem { display:flex; align-items:center; padding:14px 16px; cursor:pointer; color:var(--text); font-size:0.95rem; gap:14px; border-bottom:1px solid var(--border); }
        .pitem:last-child { border-bottom:none; }
        .pitem:active { background:var(--hover); }
        .pitem i { width:22px; text-align:center; font-size:1rem; color:var(--text-secondary); }
        .pitem .pv { color:var(--text-secondary); font-size:0.88rem; margin-left:auto; }
        .pitem.danger { color:var(--danger); }

        .sitem { display:flex; align-items:center; padding:14px 16px; cursor:pointer; color:var(--text); font-size:0.95rem; gap:14px; border-bottom:1px solid var(--border); }
        .sitem:active { background:var(--hover); }
        .sitem i { width:22px; text-align:center; color:var(--text-secondary); }
        .sitem .sv { color:var(--text-muted); font-size:0.88rem; margin-left:auto; }

        .nav { height:56px; display:flex; background:var(--surface); border-top:1px solid var(--border); padding-bottom:var(--safe-bottom); }
        .ni { flex:1; display:flex; flex-direction:column; align-items:center; padding:6px 0; cursor:pointer; color:var(--text-secondary); border:none; background:transparent; font-size:0.6rem; gap:3px; }
        .ni i { font-size:1.3rem; }
        .ni.active { color:var(--accent); }

        .login-screen { position:fixed; inset:0; background:var(--bg); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:30px 24px; width:100%; max-width:360px; }
        .field { margin-bottom:12px; }
        .field label { display:block; font-size:0.8rem; color:var(--text-secondary); margin-bottom:5px; }
        .field input { width:100%; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.95rem; outline:none; }
        .btn { width:100%; padding:13px; border:none; border-radius:8px; font-weight:600; font-size:0.95rem; cursor:pointer; margin-top:8px; }
        .btn-p { background:var(--accent); color:white; }
        .btn-o { background:transparent; color:var(--accent); }
        .err { color:var(--danger); font-size:0.78rem; text-align:center; margin-top:6px; display:none; }
        .err.show { display:block; }

        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--surface3); color:var(--text); padding:10px 20px; border-radius:22px; font-size:0.85rem; z-index:250; pointer-events:none; border:1px solid var(--border); animation:tIn 0.3s,tOut 0.3s 2.2s forwards; white-space:nowrap; }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes tOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-10px);} }

        .prem-overlay { position:fixed; inset:0; z-index:300; pointer-events:none; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); }
        .prem-anim { text-align:center; animation:premBoom 2s ease-out forwards; }
        .prem-anim .st { font-size:5rem; animation:starSpin 0.5s ease-in-out 3; }
        .prem-anim .tx { font-size:1.5rem; font-weight:700; color:#f0c860; margin-top:10px; }
        @keyframes premBoom { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.3);opacity:1} 100%{transform:scale(2);opacity:0} }
        @keyframes starSpin { 0%,100%{transform:rotate(0)scale(1)} 50%{transform:rotate(180deg)scale(1.5)} }

        .stories-row { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; }
        .story-circle { width:64px; height:64px; border-radius:50%; flex-shrink:0; border:3px solid var(--accent); padding:3px; cursor:pointer; display:flex; align-items:center; justify-content:center; background:var(--surface); }
        .story-circle .inner { width:100%; height:100%; border-radius:50%; background:linear-gradient(135deg,#f093fb,#f5576c); display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
        .story-add { border-color:var(--text-muted); border-style:dashed; }
    </style>
</head>
<body class="light">

<div class="app" id="app">
    <div class="header"><div class="header-title" id="ht">FuruGram</div><div class="header-actions"><button class="hbtn" onclick="showCreate()"><i class="fas fa-plus"></i></button><button class="hbtn" onclick="showPrem()" style="color:var(--premium);"><i class="fas fa-star"></i></button></div></div>
    <div class="content">
        <div class="sidebar" id="sidebar"><div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search..." id="searchInput" autocomplete="off"></div><div class="chat-list" id="chatList"></div></div>
        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState"><i class="fas fa-comments"></i><h3>FuruGram</h3><p id="emptyText">Select a chat</p></div>
            <div class="chat-head" id="chatHead" style="display:none;"><button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button><div class="avatar sm" id="chatAv">A</div><div class="chinfo"><div class="cname" id="chatNm"></div><div style="font-size:0.75rem;color:var(--text-secondary);" id="chatSt"></div></div></div>
            <div class="msgs" id="messages" style="display:none;"></div>

            <div class="sticker-picker" id="stickerPicker" style="display:none;flex-wrap:wrap;gap:4px;padding:8px;background:var(--surface);border-top:1px solid var(--border);max-height:150px;overflow-y:auto;"></div>
            <div class="input-row" id="inputRow" style="display:none;">
                <button class="hbtn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
                <button class="hbtn" id="emojiBtn">😊</button>
                <button class="hbtn" id="stickerBtn">🌟</button>
                <input type="text" placeholder="Message..." id="msgInput" autocomplete="off">
                <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>
    <div class="nav">
        <button class="ni active" data-p="chats"><i class="fas fa-comments"></i><span id="navChats">Chats</span></button>
        <button class="ni" data-p="contacts"><i class="fas fa-address-book"></i><span id="navContacts">Contacts</span></button>
        <button class="ni" data-p="settings"><i class="fas fa-cog"></i><span id="navSettings">Settings</span></button>
        <button class="ni" data-p="profile"><i class="fas fa-user"></i><span id="navProfile">Profile</span></button>
    </div>
</div>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🔐 FuruGram</h2>
        <p class="sub" id="loginSub">Sign in to account</p>
        <div class="field"><label>Email</label><input type="email" id="lemail" placeholder="your@email.com"></div>
        <div class="field" id="nameField" style="display:none;"><label id="lblName">Name</label><input type="text" id="lname" placeholder="Your name"></div>
        <div class="field"><label id="lblPass">Password</label><input type="password" id="lpass" placeholder="••••••"></div>
        <div class="err" id="lerr"></div><div class="ok" id="lok" style="color:#4caf50;font-size:0.78rem;text-align:center;margin-top:6px;display:none;"></div>
        <button class="btn btn-p" id="loginBtn" onclick="handleAuth()">🚀 Sign In</button>
        <button class="btn btn-o" id="switchBtn" onclick="toggleMode()">✨ Create Account</button>
        <button class="btn btn-o" onclick="switchLang()" style="font-size:0.8rem;">🌐 Русский</button>
    </div>
</div>

<div id="createModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center;">
    <div style="background:var(--surface);border-radius:14px 14px 0 0;padding:22px;width:100%;max-width:500px;">
        <h2 style="text-align:center;margin-bottom:16px;color:var(--text);" id="createTitle">✨ Create</h2>
        <div class="field"><label id="lblCreateName">Name</label><input type="text" id="cname"></div>
        <button class="btn btn-p" onclick="doCreate('channel')" style="width:100%;">📢 Channel</button>
        <button class="btn" onclick="doCreate('group')" style="width:100%;background:#4caf50;color:white;">👥 Group</button>
        <button class="btn btn-o" onclick="hideCreate()" style="width:100%;">Cancel</button>
    </div>
</div>

<div id="premModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center;">
    <div style="background:var(--surface);border-radius:14px 14px 0 0;padding:22px;width:100%;max-width:500px;">
        <h2 style="text-align:center;color:var(--text);">⭐ FuruGram Premium</h2>
        <p style="text-align:center;color:var(--text-secondary);" id="premDesc">Exclusive features (free)</p>
        <div style="text-align:left;color:var(--text-secondary);font-size:0.85rem;line-height:1.8;margin:10px 0;">
            ✅ Golden avatar frame<br>
            ✅ Exclusive stickers<br>
            ✅ Priority support<br>
            ✅ No ads<br>
            ✅ Large files
        </div>
        <button class="btn" onclick="activatePrem()" style="width:100%;background:linear-gradient(135deg,#d4a843,#f0c860);color:#1a1a2e;font-weight:700;">Activate Free</button>
        <button class="btn" onclick="cancelPrem()" id="cancelPremBtn" style="width:100%;background:var(--danger);color:white;display:none;">Cancel Premium</button>
        <button class="btn btn-o" onclick="hidePrem()" style="width:100%;">Close</button>
    </div>
</div>

<input type="file" id="avatarInput" accept="image/*" style="display:none;">

function gid(){return'id'+Date.now()+Math.random().toString(36).substr(2,6);}
function md(){if(!U)return{contacts:[],messages:{},channels:[],groups:[]};var d=gd();return d[U.id]||{contacts:[],messages:{},channels:[],groups:[]};}

function addContact(cid){var d=md();if(!d.contacts)d.contacts=[];if(d.contacts.indexOf(cid)===-1){d.contacts.push(cid);if(!d.messages)d.messages={};if(!d.messages[cid])d.messages[cid]=[];smd(d);return true;}return false;}
function isUsernameTaken(uname){var users=gu();for(var id in users){if(users[id].username.toLowerCase()===uname.toLowerCase()&&(!U||id!==U.id))return true;}return false;}
function generateUsername(name){var base=name.toLowerCase().replace(/[^a-z0-9_]/g,'_').substring(0,15);if(!base)base='user';var uname=base;while(isUsernameTaken(uname)){uname=base+'_'+Math.random().toString(36).substr(2,5);}return uname;}

window.toggleMode=function(){isReg=!isReg;document.getElementById('loginSub').textContent=isReg?t('createAcc'):t('signIn');document.getElementById('loginBtn').textContent=isReg?'✨ '+t('createAcc'):'🚀 '+t('signInBtn');document.getElementById('switchBtn').textContent=isReg?t('haveAcc'):'✨ '+t('createAcc');document.getElementById('nameField').style.display=isReg?'block':'none';document.getElementById('lerr').classList.remove('show');document.getElementById('lok').style.display='none';};
window.handleAuth=function(){var email=document.getElementById('lemail').value.trim().toLowerCase();var pass=document.getElementById('lpass').value.trim();var name=document.getElementById('lname').value.trim();var err=document.getElementById('lerr');var ok=document.getElementById('lok');err.classList.remove('show');ok.style.display='none';if(!email||!pass){err.textContent='❌ '+t('fillFields');err.classList.add('show');return;}if(!email.includes('@')){err.textContent='❌ '+t('invalidEmail');err.classList.add('show');return;}if(pass.length<3){err.textContent='❌ '+t('shortPass');err.classList.add('show');return;}if(isReg&&!name){err.textContent='❌ '+t('enterName');err.classList.add('show');return;}var users=gu();if(isReg){if(users[email]){err.textContent='❌ '+t('emailExists');err.classList.add('show');return;}var uname=generateUsername(name);users[email]={id:email,name:name,username:uname,password:pass,avatar:'',online:true,premium:false,bio:'',phone:'',birthday:'',stories:[]};if(!su(users)){err.textContent='❌ '+t('saveError');err.classList.add('show');return;}U=users[email];ss(U);ok.textContent='✅ @'+uname;ok.style.display='block';setTimeout(function(){document.getElementById('loginScreen').style.display='none';go('chats');toast('🎉 '+t('welcome'));},1000);}else{var u=users[email];if(!u){err.textContent='❌ '+t('emailExists');err.classList.add('show');return;}if(u.password!==pass){err.textContent='❌ '+t('shortPass');err.classList.add('show');return;}U=u;U.online=true;su(users);ss(U);ok.textContent='✅ OK';ok.style.display='block';setTimeout(function(){document.getElementById('loginScreen').style.display='none';go('chats');toast('👋 '+t('welcomeBack'));},400);}};

function rc(){if(!U)return;var d=md(),users=gu();var contacts=(d.contacts||[]).map(function(cid){return users[cid];}).filter(Boolean);var el=document.getElementById('chatList');el.innerHTML='';if(contacts.length===0){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-secondary);">'+t('noChats')+'</div>';return;}contacts.forEach(function(c){var div=document.createElement('div');div.className='chat-item'+(active===c.id?' active':'');div.onclick=function(){openChat(c);};div.innerHTML='<div class="avatar">'+(c.avatar?'<img src="'+c.avatar+'">':c.name.charAt(0))+(c.online?'<span class="online-dot"></span>':'')+'</div><div class="cbody"><div class="cname">'+c.name+'</div><div class="cpreview">@'+c.username+'</div></div>';el.appendChild(div);});}

function sendMsg(text,type,extra){if(!text&&!type)text=document.getElementById('msgInput').value.trim();if(!text&&!type)return;if(!active||!U)return;var d=md();if(!d.messages)d.messages={};if(!d.messages[active])d.messages[active]=[];var now=new Date();var time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');var msg={text:text||'',time:time,out:true,read:true,sender:U.name,type:type||'text'};if(extra){if(extra.img)msg.img=extra.img;}d.messages[active].push(msg);smd(d);document.getElementById('msgInput').value='';document.getElementById('emojiPicker').style.display='none';document.getElementById('stickerPicker').style.display='none';var chats=allChats();var c=chats.find(function(x){return x.id===active;});if(c)renderMsgs(c);rc();BC.postMessage({type:'msg',from:U.id,to:active,msg:msg,chatType:c?c.type:'personal'});}
function allChats(){var d=md(),users=gu(),chs=gc(),grs=gg(),list=[];(d.contacts||[]).forEach(function(cid){if(users[cid]){var u=users[cid];list.push({id:cid,type:'personal',name:u.name,username:u.username,avatar:u.avatar,online:u.online,premium:u.premium,initials:u.name.charAt(0),messages:d.messages[cid]||[]});}});(d.channels||[]).forEach(function(chId){if(chs[chId]){var c=chs[chId];list.push({id:chId,type:'channel',name:c.name,initials:c.name.charAt(0),subscribers:c.subscribers||1,messages:d.messages[chId]||[]});}});(d.groups||[]).forEach(function(grId){if(grs[grId]){var g=grs[grId];list.push({id:grId,type:'group',name:g.name,initials:g.name.charAt(0),members:g.members||1,messages:d.messages[grId]||[]});}});return list;}
function renderMsgs(c){var el=document.getElementById('messages');el.innerHTML='';var dd=document.createElement('div');dd.className='dsep';dd.innerHTML='<span>'+t('today')+'</span>';el.appendChild(dd);(c.messages||[]).forEach(function(m){var div=document.createElement('div');div.className='msg '+(m.out?'out':'in');var content='';if(m.type==='sticker')content='<span class="msg-sticker">'+m.text+'</span>';else if(m.type==='image')content='<img src="'+m.img+'" class="msg-img" onclick="previewImg(\''+m.img+'\')">';else content=m.text;div.innerHTML='<div class="mbub">'+content+'<div class="mtime">'+m.time+'</div></div>';el.appendChild(div);});el.scrollTop=el.scrollHeight;}
