<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FuruGram Messenger</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FuruGram">
    <meta name="theme-color" content="#18222e">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #18222e;
            --surface: #1c2838;
            --surface2: #212e3e;
            --surface3: #263444;
            --chat-bg: #18222e;
            --accent: #5b8cce;
            --accent-light: #6a9bd4;
            --premium: #d4a843;
            --premium-light: #f0c860;
            --text: #e9e9e9;
            --text-secondary: #8a9bb0;
            --text-muted: #5e6e80;
            --border: #253040;
            --hover: #212e3e;
            --bubble-out: #212e3e;
            --bubble-in: #2b5278;
            --online: #4caf50;
            --danger: #e74c3c;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #141c26;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            color: var(--text);
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            height: 100dvh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (min-width: 769px) {
            .app { height: 94vh; border-radius: 12px; border: 1px solid var(--border); }
        }

        /* HEADER */
        .header {
            padding: 14px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-title { font-size: 1.25rem; font-weight: 600; }
        .hbtn {
            width: 36px; height: 36px; border-radius: 50%;
            background: transparent; border: none; color: var(--text-secondary);
            font-size: 1.05rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }

        .content { flex-grow: 1; display: flex; overflow: hidden; position: relative; }

        /* SIDEBAR */
        .sidebar {
            width: 100%; background: var(--bg); display: flex;
            flex-direction: column; position: absolute; inset: 0; z-index: 5;
        }
        @media (min-width: 769px) {
            .sidebar { width: 340px; min-width: 340px; max-width: 340px; position: relative; border-right: 1px solid var(--border); }
        }
        .sidebar.hide { display: none; }
        @media (min-width: 769px) { .sidebar.hide { display: flex; } }

        .search-box { margin: 8px 10px; position: relative; }
        .search-box input {
            width: 100%; padding: 10px 10px 10px 36px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 10px; color: var(--text);
            font-size: 0.9rem; outline: none;
        }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .chat-list { flex-grow: 1; overflow-y: auto; }
        .chat-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer;
            border-left: 3px solid transparent;
        }
        .chat-item:active { background: var(--hover); }
        .chat-item.active { background: var(--hover); border-left-color: var(--accent); }

        .avatar {
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem; color: white; flex-shrink: 0; overflow: hidden;
            position: relative; background-size: cover; background-position: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar.sm { width: 38px; height: 38px; font-size: 0.9rem; }
        .avatar.lg { width: 72px; height: 72px; font-size: 2rem; }
        .online-dot {
            position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px;
            background: var(--online); border-radius: 50%; border: 2px solid var(--bg);
        }

        .cbody { flex-grow: 1; min-width: 0; }
        .cname { font-weight: 500; font-size: 0.95rem; }
        .cpreview { font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
        .cmeta { text-align: right; flex-shrink: 0; }
        .unread { background: var(--accent); color: white; font-size: 0.7rem; padding: 3px 7px; border-radius: 12px; display: inline-block; }

        /* CHAT AREA */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        .chat-head {
            padding: 12px 14px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; background: var(--surface);
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: 50%; background: transparent;
            border: none; color: var(--text-secondary); font-size: 1.05rem; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }
        @media (max-width: 768px) { .back-btn { display: flex; } }

        .msgs { flex-grow: 1; padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .msg { display: flex; max-width: 75%; }
        .msg.out { align-self: flex-end; }
        .mbub { padding: 9px 13px; border-radius: 12px; font-size: 0.93rem; line-height: 1.42; word-break: break-word; }
        .msg.in .mbub { background: var(--bubble-out); border-bottom-left-radius: 4px; }
        .msg.out .mbub { background: var(--bubble-in); color: white; border-bottom-right-radius: 4px; }
        .msnd { font-size: 0.73rem; font-weight: 600; color: var(--accent-light); margin-bottom: 2px; }
        .mtime { font-size: 0.65rem; opacity: 0.5; text-align: right; margin-top: 4px; }
        .msg.out .mtime { opacity: 0.75; }
        .dsep { text-align: center; margin: 10px 0; font-size: 0.73rem; color: var(--text-muted); }
        .dsep span { background: var(--chat-bg); padding: 3px 12px; border-radius: 10px; border: 1px solid var(--border); }

        .input-row {
            padding: 8px 12px; padding-bottom: calc(8px + var(--safe-bottom));
            border-top: 1px solid var(--border); display: flex; align-items: center;
            gap: 8px; background: var(--surface);
        }
        .input-row input {
            flex-grow: 1; padding: 10px 14px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 20px; color: var(--text);
            font-size: 0.92rem; outline: none;
        }
        .sbtn {
            width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
            border: none; color: white; font-size: 0.95rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .empty {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; color: var(--text-secondary); gap: 10px; text-align: center; padding: 20px;
        }

        /* PAGES */
        .page { position: absolute; inset: 0; background: var(--bg); z-index: 6; overflow-y: auto; display: none; }
        .page.show { display: block; }

        /* PROFILE */
        .prof-top { padding: 24px 16px; text-align: center; background: var(--surface); border-bottom: 1px solid var(--border); }
        .prof-av {
            width: 76px; height: 76px; border-radius: 50%; background: var(--accent);
            margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 700; color: white; cursor: pointer; overflow: hidden;
        }
        .prof-av img { width: 100%; height: 100%; object-fit: cover; }
        .prof-name { font-size: 1.35rem; font-weight: 600; }
        .prof-uname { color: var(--text-secondary); font-size: 0.9rem; margin-top: 2px; }
        .prof-bio { color: var(--text-secondary); font-size: 0.85rem; margin-top: 6px; }
        .prof-stats { display: flex; justify-content: center; gap: 28px; margin-top: 16px; }
        .pstat { text-align: center; }
        .pstat-num { font-weight: 600; font-size: 1.15rem; }
        .pstat-lbl { font-size: 0.7rem; color: var(--text-muted); }

        .psec { margin: 10px 0; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .psec-title { padding: 12px 16px 6px; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
        .pitem {
            display: flex; align-items: center; padding: 14px 16px; cursor: pointer;
            color: var(--text); font-size: 0.95rem; gap: 14px; border-bottom: 1px solid var(--border);
        }
        .pitem:last-child { border-bottom: none; }
        .pitem:active { background: var(--hover); }
        .pitem i { width: 22px; text-align: center; font-size: 1rem; color: var(--text-secondary); }
        .pitem .pv { color: var(--text-secondary); font-size: 0.88rem; margin-left: auto; }
        .pitem.danger { color: var(--danger); }
        .pitem.danger i { color: var(--danger); }

        /* BOTTOM NAV */
        .nav {
            display: flex; background: var(--surface); border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom); flex-shrink: 0;
        }
        .ni {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 7px 0; cursor: pointer; color: var(--text-secondary);
            border: none; background: transparent; font-size: 0.62rem; gap: 4px;
        }
        .ni i { font-size: 1.25rem; }
        .ni.active { color: var(--accent); }

        /* LOGIN SCREEN */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 300;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 30px 24px; width: 100%; max-width: 360px;
        }
        .login-card h2 { text-align: center; font-size: 1.3rem; margin-bottom: 6px; }
        .login-card .sub { text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; }
        .field input {
            width: 100%; padding: 11px 12px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 8px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 8px;
        }
        .btn-p { background: var(--accent); color: white; }
        .btn-g { background: #4caf50; color: white; }
        .err { color: var(--danger); font-size: 0.78rem; margin-top: 4px; display: none; text-align: center; }
        .err.show { display: block; }
        .test-info {
            background: var(--surface2); border-radius: 8px; padding: 10px;
            margin-top: 14px; text-align: center; font-size: 0.78rem; color: var(--text-secondary);
        }
        .test-info span { color: var(--accent-light); font-weight: 600; }

        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: var(--surface3); color: white; padding: 10px 20px;
            border-radius: 22px; font-weight: 500; font-size: 0.85rem; z-index: 250;
            pointer-events: none; animation: tIn 0.3s, tOut 0.3s 2.2s forwards; white-space: nowrap;
        }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes tOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-10px);} }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <div class="header-title" id="ht">FuruGram</div>
        <div class="header-actions">
            <button class="hbtn" onclick="showCreate()"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <div class="content">
        <div class="sidebar" id="sidebar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Поиск контактов..." id="searchInput" autocomplete="off">
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty" id="emptyState">
                <div style="font-size:3rem;opacity:0.15;">💬</div>
                <h3>FuruGram v16.1</h3>
                <p>Выберите чат или добавьте контакты</p>
            </div>
            <div class="chat-head" id="chatHead" style="display:none;">
                <button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
                <div class="avatar sm" id="chatAv">A</div>
                <div>
                    <div class="cname" id="chatNm"></div>
                    <div style="font-size:0.75rem;color:var(--text-secondary);" id="chatSt"></div>
                </div>
            </div>
            <div class="msgs" id="messages" style="display:none;"></div>
            <div class="input-row" id="inputRow" style="display:none;">
                <input type="text" placeholder="Сообщение..." id="msgInput" autocomplete="off">
                <button class="sbtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="page" id="contactsPage"></div>
        <div class="page" id="profilePage"></div>
        <div class="page" id="settingsPage"></div>
    </div>

    <div class="nav">
        <button class="ni active" data-p="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
        <button class="ni" data-p="contacts"><i class="fas fa-address-book"></i><span>Контакты</span></button>
        <button class="ni" data-p="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
        <button class="ni" data-p="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
    </div>
</div>

<!-- LOGIN SCREEN (ВСЕГДА ПОВЕРХ) -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🔐 FuruGram</h2>
        <p class="sub">Войдите или создайте аккаунт</p>
        
        <div class="field">
            <label>Email</label>
            <input type="email" id="lemail" placeholder="anna@furu.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" id="lpass" placeholder="123456" autocomplete="current-password">
        </div>
        
        <div class="err" id="lerr"></div>
        
        <button class="btn btn-p" onclick="doLogin()">🚀 Войти</button>
        <button class="btn btn-g" onclick="doRegister()">✨ Создать аккаунт</button>
        
        <div class="test-info">
            📋 <b>Тестовые аккаунты:</b><br>
            <span>anna@furu.com</span> / 123456<br>
            <span>max@furu.com</span> / 123456<br>
            <span>admin@furu.com</span> / admin123
        </div>
    </div>
</div>

<!-- CREATE MODAL -->
<div class="modal-bg" id="createModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:400; align-items:flex-end; justify-content:center;">
    <div style="background:var(--surface); border-radius:14px 14px 0 0; padding:22px 18px; width:100%; max-width:500px;">
        <h2 style="text-align:center;margin-bottom:16px;">✨ Создать</h2>
        <div class="field"><label>Название</label><input type="text" id="cname" placeholder="Название"></div>
        <button class="btn btn-p" onclick="doCreate('channel')" style="width:100%;">📢 Создать канал</button>
        <button class="btn btn-g" onclick="doCreate('group')" style="width:100%;">👥 Создать группу</button>
        <button class="btn" onclick="hideCreate()" style="width:100%;background:transparent;color:var(--text-secondary);">Отмена</button>
    </div>
</div>

<script>
// ===== ТЕСТОВЫЕ АККАУНТЫ =====
// anna@furu.com / 123456
// max@furu.com / 123456
// admin@furu.com / admin123

(function() {
    var US = 'fg161_u', DB = 'fg161_d', SS = 'fg161_s';
    var BC = new BroadcastChannel('fg161');

    function gu() { return JSON.parse(localStorage.getItem(US)||'{}'); }
    function su(v) { localStorage.setItem(US,JSON.stringify(v)); }
    function gd() { return JSON.parse(localStorage.getItem(DB)||'{}'); }
    function sd(v) { localStorage.setItem(DB,JSON.stringify(v)); }
    function gs() { return JSON.parse(localStorage.getItem(SS)||'null'); }
    function ss(v) { localStorage.setItem(SS,JSON.stringify(v)); }

    // СОЗДАЁМ ТЕСТОВЫЕ АККАУНТЫ ПРИ ПЕРВОМ ЗАПУСКЕ
    if (Object.keys(gu()).length === 0) {
        su({
            'anna@furu.com': {id:'anna@furu.com',name:'Анна Иванова',username:'anna',password:'123456',avatar:'',online:false,premium:false,bio:'Люблю путешествия ✈️',phone:'',birthday:''},
            'max@furu.com': {id:'max@furu.com',name:'Максим Кодер',username:'max_codes',password:'123456',avatar:'',online:false,premium:false,bio:'Разработчик 💻',phone:'',birthday:''},
            'admin@furu.com': {id:'admin@furu.com',name:'Админ',username:'admin',password:'admin123',avatar:'',online:false,premium:true,bio:'Главный админ',phone:'',birthday:''}
        });
        console.log('✅ Тестовые аккаунты созданы!');
    }

    var U = null;
    var active = null;
    var page = 'chats';

    function toast(m) {
        var t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
        document.body.appendChild(t); setTimeout(function(){t.remove();},2500);
    }

    function md() {
        if (!U) return {contacts:[],messages:{}};
        var d = gd();
        return d[U.id] || {contacts:[],messages:{}};
    }
    function smd(v) { var d = gd(); d[U.id] = v; sd(d); }

    function addContact(cid) {
        var d = md();
        if (!d.contacts) d.contacts = [];
        if (d.contacts.indexOf(cid) === -1) {
            d.contacts.push(cid);
            if (!d.messages) d.messages = {};
            if (!d.messages[cid]) d.messages[cid] = [];
            smd(d);
            return true;
        }
        return false;
    }

    // ===== НАВИГАЦИЯ =====
    function go(p) {
        page = p;
        document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
        var ni = document.querySelector('[data-p="'+p+'"]');
        if (ni) ni.classList.add('active');
        
        document.getElementById('sidebar').classList.toggle('hide', p !== 'chats');
        document.getElementById('contactsPage').classList.toggle('show', p === 'contacts');
        document.getElementById('profilePage').classList.toggle('show', p === 'profile');
        document.getElementById('settingsPage').classList.toggle('show', p === 'settings');
        
        if (p === 'chats') rc();
        if (p === 'contacts') rco();
        if (p === 'profile') rp();
        if (p === 'settings') rs();
        
        document.getElementById('ht').textContent = p==='chats'?'FuruGram':p==='contacts'?'Контакты':p==='profile'?'Профиль':'Настройки';
    }

    document.querySelectorAll('.ni').forEach(function(n){n.addEventListener('click',function(){go(n.dataset.p);});});

    // ===== ЧАТЫ =====
    function rc() {
        if (!U) return;
        var d = md();
        var users = gu();
        var contacts = (d.contacts||[]).map(function(cid){return users[cid];}).filter(Boolean);
        var el = document.getElementById('chatList');
        el.innerHTML = '';
        if (contacts.length === 0) {
            el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Нет чатов.<br>Добавьте контакты через поиск 🔍</div>';
            return;
        }
        contacts.forEach(function(c){
            var div = document.createElement('div');
            div.className = 'chat-item' + (active===c.id?' active':'');
            div.onclick = function(){ openChat(c); };
            div.innerHTML = 
                '<div class="avatar">'+(c.avatar?'<img src="'+c.avatar+'">':c.name.charAt(0))+(c.online?'<span class="online-dot"></span>':'')+'</div>'+
                '<div class="cbody"><div class="cname">'+c.name+'</div><div class="cpreview">Нажмите, чтобы открыть чат</div></div>';
            el.appendChild(div);
        });
    }

    function openChat(c) {
        active = c.id;
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatHead').style.display = 'flex';
        document.getElementById('messages').style.display = 'flex';
        document.getElementById('inputRow').style.display = 'flex';
        document.getElementById('chatNm').textContent = c.name;
        document.getElementById('chatAv').innerHTML = c.avatar ? '<img src="'+c.avatar+'">' : c.name.charAt(0);
        document.getElementById('chatSt').innerHTML = '<span style="color:#4caf50;">●</span> онлайн';
        document.getElementById('messages').innerHTML = '<div class="dsep"><span>Начните переписку</span></div>';
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('hide');
    }

    function closeChat() {
        active = null;
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('chatHead').style.display = 'none';
        document.getElementById('messages').style.display = 'none';
        document.getElementById('inputRow').style.display = 'none';
        document.getElementById('sidebar').classList.remove('hide');
    }

    function sendMsg() {
        var text = document.getElementById('msgInput').value.trim();
        if (!text || !active) return;
        var el = document.getElementById('messages');
        el.innerHTML += '<div class="msg out"><div class="mbub">'+text+'<div class="mtime">'+new Date().toLocaleTimeString().slice(0,5)+'</div></div></div>';
        document.getElementById('msgInput').value = '';
        el.scrollTop = el.scrollHeight;
    }

    document.getElementById('msgInput').addEventListener('keypress',function(e){if(e.key==='Enter')sendMsg();});

    // ===== КОНТАКТЫ =====
    function rco() {
        if (!U) return;
        var d = md(), users = gu();
        var contacts = (d.contacts||[]).map(function(cid){return users[cid];}).filter(Boolean);
        var el = document.getElementById('contactsPage');
        el.innerHTML = contacts.length === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-secondary);">Нет контактов</div>' : '';
        contacts.forEach(function(c){
            var div = document.createElement('div');
            div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;';
            div.innerHTML = '<div class="avatar sm">'+(c.avatar?'<img src="'+c.avatar+'">':c.name.charAt(0))+'</div><div><div style="font-weight:500;">'+c.name+'</div><div style="font-size:0.8rem;color:var(--text-secondary);">@'+c.username+'</div></div>';
            div.onclick = function(){go('chats');setTimeout(function(){openChat(c);},100);};
            el.appendChild(div);
        });
    }

    // ===== ПРОФИЛЬ =====
    function rp() {
        if (!U) return;
        var el = document.getElementById('profilePage');
        el.innerHTML = 
            '<div class="prof-top">'+
            '<div class="prof-av">'+(U.avatar?'<img src="'+U.avatar+'">':U.name.charAt(0).toUpperCase())+'</div>'+
            '<div class="prof-name">'+U.name+'</div>'+
            '<div class="prof-uname">@'+U.username+'</div>'+
            (U.bio?'<div class="prof-bio">'+U.bio+'</div>':'')+
            '<div class="prof-stats">'+
            '<div class="pstat"><div class="pstat-num">'+(md().contacts||[]).length+'</div><div class="pstat-lbl">контакты</div></div>'+
            '<div class="pstat"><div class="pstat-num">0</div><div class="pstat-lbl">группы</div></div>'+
            '<div class="pstat"><div class="pstat-num">0</div><div class="pstat-lbl">каналы</div></div>'+
            '</div></div>'+
            '<div class="psec">'+
            '<div class="pitem" onclick="editF(\'name\')"><i class="fas fa-user"></i>Имя<span class="pv">'+U.name+'</span></div>'+
            '<div class="pitem" onclick="editF(\'username\')"><i class="fas fa-at"></i>Юзернейм<span class="pv">@'+U.username+'</span></div>'+
            '<div class="pitem" onclick="editF(\'bio\')"><i class="fas fa-info-circle"></i>Био<span class="pv">'+(U.bio||'—')+'</span></div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="pitem danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Выйти</div>'+
            '</div>';
    }

    window.editF = function(field) {
        var labels = {name:'Имя',username:'Юзернейм',bio:'Био'};
        var values = {name:U.name,username:U.username,bio:U.bio||''};
        var nv = prompt(labels[field]+':', values[field]);
        if (!nv || !nv.trim()) return;
        nv = nv.trim();
        var users = gu();
        if (field==='name') { U.name=nv; users[U.id].name=nv; }
        else if (field==='username') {
            if (!/^[a-z0-9_]+$/.test(nv)) { toast('Только латиница, цифры, _'); return; }
            for (var id in users) { if (users[id].username===nv && id!==U.id) { toast('Занят'); return; } }
            U.username=nv; users[U.id].username=nv;
        }
        else if (field==='bio') { U.bio=nv; users[U.id].bio=nv; }
        su(users); rp(); toast(labels[field]+' обновлено!');
    };

    window.logout = function() {
        U = null; active = null; ss(null);
        document.getElementById('loginScreen').style.display = 'flex';
        go('chats');
    };

    // ===== SETTINGS =====
    function rs() {
        var el = document.getElementById('settingsPage');
        el.innerHTML = 
            '<div class="psec" style="margin-top:0;">'+
            '<div class="pitem"><i class="fas fa-bell"></i>Уведомления</div>'+
            '<div class="pitem"><i class="fas fa-lock"></i>Приватность</div>'+
            '<div class="pitem"><i class="fas fa-palette"></i>Тема<span class="pv">Тёмная</span></div>'+
            '</div>'+
            '<div class="psec">'+
            '<div class="pitem"><i class="fas fa-info-circle"></i>Версия<span class="pv">16.1</span></div>'+
            '</div>';
    }

    // ===== SEARCH =====
    document.getElementById('searchInput').addEventListener('input', function(){
        var q = this.value.trim().toLowerCase();
        if (q.length >= 2) {
            var users = gu();
            for (var id in users) {
                if (id !== U.id && (users[id].username.toLowerCase().includes(q) || users[id].name.toLowerCase().includes(q))) {
                    if (addContact(id)) { toast('✅ '+users[id].name+' добавлен!'); rc(); }
                    break;
                }
            }
        }
    });

    // ===== CREATE =====
    function showCreate() { document.getElementById('createModal').style.display='flex'; }
    function hideCreate() { document.getElementById('createModal').style.display='none'; }
    window.doCreate = function(type) {
        var n = document.getElementById('cname').value.trim();
        if (!n) { toast('Введите название'); return; }
        hideCreate();
        toast((type==='channel'?'📢 Канал':'👥 Группа')+' «'+n+'» создан!');
    };

    // ===== LOGIN =====
    function doLogin() {
        var email = document.getElementById('lemail').value.trim().toLowerCase();
        var pass = document.getElementById('lpass').value.trim();
        var err = document.getElementById('lerr');
        err.classList.remove('show');
        
        if (!email || !pass) {
            err.textContent = 'Заполните все поля';
            err.classList.add('show');
            return;
        }
        
        var users = gu();
        var u = users[email];
        
        if (u && u.password === pass) {
            U = u;
            U.online = true;
            su(users);
            ss(U);
            document.getElementById('loginScreen').style.display = 'none';
            go('chats');
            toast('👋 Добро пожаловать, '+U.name+'!');
        } else {
            err.textContent = '❌ Неверный email или пароль';
            err.classList.add('show');
        }
    }

    function doRegister() {
        var email = document.getElementById('lemail').value.trim().toLowerCase();
        var pass = document.getElementById('lpass').value.trim();
        var err = document.getElementById('lerr');
        err.classList.remove('show');
        
        if (!email || !pass) {
            err.textContent = 'Заполните все поля';
            err.classList.add('show');
            return;
        }
        if (!email.includes('@')) {
            err.textContent = 'Введите корректный email';
            err.classList.add('show');
            return;
        }
        if (pass.length < 3) {
            err.textContent = 'Пароль минимум 3 символа';
            err.classList.add('show');
            return;
        }
        
        var users = gu();
        if (users[email]) {
            err.textContent = 'Аккаунт уже существует';
            err.classList.add('show');
            return;
        }
        
        var name = prompt('Введите ваше имя:', email.split('@')[0]);
        if (!name || !name.trim()) return;
        name = name.trim();
        
        var uname = email.split('@')[0].replace(/[^a-z0-9_]/g,'_');
        // Проверка уникальности
        var exists = false;
        for (var id in users) {
            if (users[id].username === uname) { exists = true; break; }
        }
        if (exists) uname += '_'+Math.random().toString(36).substr(2,3);
        
        users[email] = {
            id: email, name: name, username: uname, password: pass,
            avatar: '', online: true, premium: false, bio: '', phone: '', birthday: ''
        };
        su(users);
        
        U = users[email];
        ss(U);
        document.getElementById('loginScreen').style.display = 'none';
        go('chats');
        toast('🎉 Добро пожаловать, '+name+'! Ваш юзернейм: @'+uname);
    }

    // ===== АВТО-ВХОД =====
    (function(){
        var s = gs();
        if (s) {
            var users = gu();
            if (users[s.id] && users[s.id].password === s.password) {
                U = users[s.id];
                U.online = true;
                su(users);
                document.getElementById('loginScreen').style.display = 'none';
                go('chats');
                return;
            }
        }
        // Показываем экран входа
        document.getElementById('loginScreen').style.display = 'flex';
    })();

    go('chats');
    console.log('🚀 FuruGram v16.1 готов!');
    console.log('📋 Тестовые аккаунты:');
    console.log('  anna@furu.com / 123456');
    console.log('  max@furu.com / 123456');
    console.log('  admin@furu.com / admin123');
})();
</script>
