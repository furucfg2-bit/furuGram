<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuruGram Admin Panel v24</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --accent: #3390ec;
            --premium: #d4a843;
            --text: #000000;
            --text-secondary: #707579;
            --border: #e0e0e0;
            --hover: #f0f2f5;
            --danger: #e53935;
            --online: #4caf50;
        }
        .dark {
            --bg: #18222e;
            --surface: #1c2838;
            --surface2: #212e3e;
            --accent: #5b8cce;
            --text: #e9e9e9;
            --text-secondary: #8a9bb0;
            --border: #253040;
            --hover: #212e3e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); display: flex; min-height: 100vh;
        }
        .sidebar {
            width: 250px; background: var(--surface); border-right: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
        .nav-btn {
            padding: 12px 16px; background: transparent; border: none; border-radius: 10px;
            color: var(--text-secondary); cursor: pointer; text-align: left; font-size: 0.9rem;
            font-weight: 500; transition: 0.15s; display: flex; align-items: center; gap: 10px;
        }
        .nav-btn:hover { background: var(--hover); color: var(--text); }
        .nav-btn.active { background: var(--accent); color: white; }
        .main {
            flex-grow: 1; padding: 30px; overflow-y: auto; max-height: 100vh;
        }
        .main h1 { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; text-align: center;
        }
        .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
        table {
            width: 100%; border-collapse: collapse; background: var(--surface);
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
        }
        th, td {
            padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        th { background: var(--surface2); color: var(--text-secondary); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        tr:hover td { background: var(--hover); }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600;
        }
        .badge-online { background: rgba(76,175,80,0.15); color: var(--online); }
        .badge-offline { background: rgba(112,117,121,0.15); color: var(--text-secondary); }
        .badge-premium { background: rgba(212,168,67,0.15); color: var(--premium); }
        .badge-admin { background: rgba(243,156,18,0.15); color: #f39c12; }
        .btn-sm {
            padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            font-size: 0.78rem; font-weight: 500; transition: 0.15s; margin: 2px;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm.danger { color: var(--danger); }
        .btn-sm.danger:hover { border-color: var(--danger); background: rgba(229,57,53,0.1); }
        .btn-sm.success { color: var(--online); }
        .btn-sm.success:hover { border-color: var(--online); background: rgba(76,175,80,0.1); }
        .btn-sm.warning { color: var(--premium); }
        .btn-sm.warning:hover { border-color: var(--premium); background: rgba(212,168,67,0.1); }
        .btn-refresh {
            padding: 10px 18px; background: var(--accent); border: none; border-radius: 10px;
            color: white; cursor: pointer; font-weight: 600; font-size: 0.9rem; margin-bottom: 16px;
        }
        .btn-refresh:hover { opacity: 0.9; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
        .field input, .field select {
            width: 100%; padding: 10px 12px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 0.9rem; outline: none;
        }
        .field input:focus { border-color: var(--accent); }
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: var(--accent);
            color: white; padding: 12px 20px; border-radius: 10px; font-weight: 600;
            font-size: 0.85rem; z-index: 100; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        @media (max-width:768px) {
            body { flex-direction:column; }
            .sidebar { width:100%; flex-direction:row; flex-wrap:wrap; padding:12px; gap:4px; }
            .sidebar h2 { width:100%; }
            .nav-btn { flex:1; text-align:center; font-size:0.78rem; padding:10px; }
            .main { padding:16px; }
            table { font-size:0.75rem; }
            th, td { padding:8px 10px; }
        }
    </style>
</head>
<body class="light">

<div class="sidebar">
    <h2>👑 Admin v24</h2>
    <button class="nav-btn active" data-page="dashboard"><i class="fas fa-chart-bar"></i> Дашборд</button>
    <button class="nav-btn" data-page="users"><i class="fas fa-users"></i> Пользователи</button>
    <button class="nav-btn" data-page="stars"><i class="fas fa-star"></i> Выдать звёзды</button>
    <button class="nav-btn" data-page="premium"><i class="fas fa-crown"></i> Premium</button>
    <button class="nav-btn" data-page="channels"><i class="fas fa-bullhorn"></i> Каналы</button>
    <button class="nav-btn" data-page="groups"><i class="fas fa-user-friends"></i> Группы</button>
    <button class="nav-btn" data-page="messages"><i class="fas fa-comments"></i> Сообщения</button>
    <button class="nav-btn" data-page="settings"><i class="fas fa-cog"></i> Настройки</button>
</div>

<div class="main" id="mainContent"></div>

<script>
(function(){
var US='fg24u',DB='fg24d',CH='fg24ch',GR='fg24gr';
function gu(){try{return JSON.parse(localStorage.getItem(US)||'{}');}catch(e){return{};}}
function su(v){try{localStorage.setItem(US,JSON.stringify(v));return true;}catch(e){return false;}}
function gd(){try{return JSON.parse(localStorage.getItem(DB)||'{}');}catch(e){return{};}}
function sd(v){try{localStorage.setItem(DB,JSON.stringify(v));return true;}catch(e){return false;}}
function gc(){try{return JSON.parse(localStorage.getItem(CH)||'{}');}catch(e){return{};}}
function sc(v){try{localStorage.setItem(CH,JSON.stringify(v));}catch(e){return false;}}
function gg(){try{return JSON.parse(localStorage.getItem(GR)||'{}');}catch(e){return{};}}
function sg(v){try{localStorage.setItem(GR,JSON.stringify(v));}catch(e){return false;}}

function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}

function renderDashboard(){
    var users=gu(),db=gd(),chs=gc(),grs=gg();
    var total=Object.keys(users).length;
    var online=Object.values(users).filter(function(u){return u.online;}).length;
    var premium=Object.values(users).filter(function(u){return u.premium;}).length;
    var msgs=0;for(var e in db){for(var c in db[e].messages||{}){msgs+=db[e].messages[c].length;}}
    return '<h1>📊 Дашборд</h1><button class="btn-refresh" onclick="refresh()">🔄 Обновить</button>'+
    '<div class="stats">'+
    '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">Пользователей</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+online+'</div><div class="stat-label">Онлайн</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+premium+'</div><div class="stat-label">Premium</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+msgs+'</div><div class="stat-label">Сообщений</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+Object.keys(chs).length+'</div><div class="stat-label">Каналов</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+Object.keys(grs).length+'</div><div class="stat-label">Групп</div></div>'+
    '</div>';
}

function renderUsers(){
    var users=gu();
    var html='<h1>👥 Пользователи</h1><button class="btn-refresh" onclick="refresh()">🔄 Обновить</button><table><thead><tr><th>Email</th><th>Имя</th><th>Юзернейм</th><th>Звёзды</th><th>Premium</th><th>Статус</th><th>Подарки</th><th>Действия</th></tr></thead><tbody>';
    for(var id in users){
        var u=users[id];
        html+='<tr>'+
        '<td>'+id.substring(0,25)+'</td>'+
        '<td>'+u.name+'</td>'+
        '<td>@'+u.username+'</td>'+
        '<td>'+(u.stars||0)+' ⭐</td>'+
        '<td>'+(u.premium?'<span class="badge badge-premium">⭐ Premium</span>':'<span class="badge badge-offline">—</span>')+'</td>'+
        '<td>'+(u.online?'<span class="badge badge-online">Онлайн</span>':'<span class="badge badge-offline">Оффлайн</span>')+'</td>'+
        '<td>'+(u.gifts||[]).join(' ')+'</td>'+
        '<td>'+
        '<button class="btn-sm success" onclick="giveStars(\''+id+'\')">⭐ Звёзды</button>'+
        '<button class="btn-sm warning" onclick="togglePremium(\''+id+'\')">'+(u.premium?'⬇ Снять':'👑 Premium')+'</button>'+
        '<button class="btn-sm danger" onclick="deleteUser(\''+id+'\')">🗑️</button>'+
        '</td></tr>';
    }
    return html+'</tbody></table>';
}

function renderStars(){
    var users=gu();
    var html='<h1>⭐ Выдать звёзды</h1><div class="stat-card" style="margin-bottom:16px;text-align:left;max-width:400px;">'+
    '<div class="field"><label>Пользователь</label><select id="starUser">';
    for(var id in users){html+='<option value="'+id+'">'+users[id].name+' (@'+users[id].username+') — '+users[id].stars+' ⭐</option>';}
    html+='</select></div>'+
    '<div class="field"><label>Количество звёзд</label><input type="number" id="starAmount" value="50" min="1" max="10000"></div>'+
    '<button class="btn-refresh" onclick="doGiveStars()" style="width:100%;">⭐ Выдать звёзды</button>'+
    '<p style="color:var(--text-secondary);margin-top:8px;font-size:0.85rem;">Звёзды можно использовать для покупки подарков в магазине.</p>'+
    '</div>';
    return html;
}

function renderPremium(){
    var users=gu();
    var html='<h1>👑 Управление Premium</h1><div class="stat-card" style="margin-bottom:16px;text-align:left;max-width:400px;">'+
    '<div class="field"><label>Пользователь</label><select id="premUser">';
    for(var id in users){html+='<option value="'+id+'">'+users[id].name+' (@'+users[id].username+') — '+(users[id].premium?'Premium':'Обычный')+'</option>';}
    html+='</select></div>'+
    '<button class="btn-refresh" onclick="doTogglePremium()" style="width:100%;background:linear-gradient(135deg,#d4a843,#f0c860);color:#1a1a2e;">👑 Включить/Отключить Premium</button>'+
    '<p style="color:var(--text-secondary);margin-top:8px;font-size:0.85rem;">Premium даёт золотую рамку аватара и эксклюзивные функции.</p>'+
    '</div>';
    return html;
}

function renderChannels(){
    var chs=gc();
    var html='<h1>📢 Каналы</h1><table><thead><tr><th>ID</th><th>Название</th><th>Создатель</th><th>Подписчики</th></tr></thead><tbody>';
    for(var id in chs){html+='<tr><td>'+id+'</td><td>'+chs[id].name+'</td><td>'+chs[id].creatorId+'</td><td>'+chs[id].subscribers+'</td></tr>';}
    return html+'</tbody></table>';
}

function renderGroups(){
    var grs=gg();
    var html='<h1>👥 Группы</h1><table><thead><tr><th>ID</th><th>Название</th><th>Создатель</th><th>Участники</th></tr></thead><tbody>';
    for(var id in grs){html+='<tr><td>'+id+'</td><td>'+grs[id].name+'</td><td>'+grs[id].creatorId+'</td><td>'+grs[id].members+'</td></tr>';}
    return html+'</tbody></table>';
}

function renderMessages(){
    var db=gd(),users=gu();
    var all=[];for(var ue in db){for(var cid in db[ue].messages||{}){db[ue].messages[cid].forEach(function(m){all.push({user:ue,chat:cid,text:m.text||'',time:m.time||'',sender:m.sender||''});});}}
    all.sort(function(a,b){return b.time.localeCompare(a.time);});
    var html='<h1>💬 Последние сообщения</h1><table><thead><tr><th>От</th><th>Чат</th><th>Текст</th><th>Время</th><th>Действия</th></tr></thead><tbody>';
    all.slice(0,100).forEach(function(m){html+='<tr><td>'+m.sender+'</td><td>'+m.chat.substring(0,15)+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+m.text+'</td><td>'+m.time+'</td><td><button class="btn-sm danger" onclick="deleteMsg(\''+m.user+'\',\''+m.chat+'\',\''+m.time+'\')">🗑️</button></td></tr>';});
    return html+'</tbody></table><p style="color:var(--text-secondary);margin-top:8px;">Показаны последние 100 сообщений</p>';
}

function renderSettings(){
    return '<h1>🔧 Настройки</h1>'+
    '<div class="stat-card" style="max-width:400px;">'+
    '<button class="btn-refresh" style="background:var(--danger);width:100%;" onclick="clearAll()">⚠️ Сбросить все данные</button>'+
    '<p style="color:var(--text-secondary);margin-top:8px;font-size:0.85rem;">Это удалит ВСЕХ пользователей, сообщения, каналы и группы. Отменить нельзя!</p>'+
    '<p style="color:var(--text-secondary);margin-top:16px;">Версия админ-панели: <b>24.0</b></p>'+
    '<p style="color:var(--text-secondary);">Совместима с FuruGram v24.0</p>'+
    '</div>';
}

// ACTIONS
window.giveStars=function(id){var amt=prompt('Сколько звёзд выдать пользователю '+id+'?','50');if(!amt||isNaN(amt))return;amt=parseInt(amt);var u=gu();if(u[id]){u[id].stars=(u[id].stars||0)+amt;su(u);toast('⭐ Выдано '+amt+' звёзд!');refresh();}};
window.doGiveStars=function(){var id=document.getElementById('starUser').value;var amt=parseInt(document.getElementById('starAmount').value);if(!amt||amt<1)return;var u=gu();if(u[id]){u[id].stars=(u[id].stars||0)+amt;su(u);toast('⭐ Выдано '+amt+' звёзд пользователю '+u[id].name+'!');refresh();}};
window.togglePremium=function(id){var u=gu();if(u[id]){u[id].premium=!u[id].premium;su(u);toast(u[id].premium?'👑 Premium включен!':'⬇ Premium отключен');refresh();}};
window.doTogglePremium=function(){var id=document.getElementById('premUser').value;var u=gu();if(u[id]){u[id].premium=!u[id].premium;su(u);toast(u[id].premium?'👑 Premium включен для '+u[id].name:'⬇ Premium отключен для '+u[id].name);refresh();}};
window.deleteUser=function(id){if(confirm('Удалить пользователя '+id+'?')){var u=gu();delete u[id];su(u);var d=gd();delete d[id];sd(d);toast('🗑️ Пользователь удалён');refresh();}};
window.deleteMsg=function(user,chat,time){var d=gd();if(d[user]&&d[user].messages[chat]){d[user].messages[chat]=d[user].messages[chat].filter(function(m){return m.time!==time;});sd(d);toast('Сообщение удалено');refresh();}};
window.clearAll=function(){if(confirm('Удалить ВСЕ данные? Это нельзя отменить!')){if(confirm('Точно удалить?')){localStorage.removeItem(US);localStorage.removeItem(DB);localStorage.removeItem(CH);localStorage.removeItem(GR);toast('Всё сброшено! Обновите страницу.');setTimeout(function(){location.reload();},1500);}}};

function navigate(page){
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelector('[data-page="'+page+'"]').classList.add('active');
    var mc=document.getElementById('mainContent');
    if(page==='dashboard')mc.innerHTML=renderDashboard();
    else if(page==='users')mc.innerHTML=renderUsers();
    else if(page==='stars')mc.innerHTML=renderStars();
    else if(page==='premium')mc.innerHTML=renderPremium();
    else if(page==='channels')mc.innerHTML=renderChannels();
    else if(page==='groups')mc.innerHTML=renderGroups();
    else if(page==='messages')mc.innerHTML=renderMessages();
    else if(page==='settings')mc.innerHTML=renderSettings();
}

window.refresh=function(){
    var active=document.querySelector('.nav-btn.active');
    navigate(active?active.dataset.page:'dashboard');
};

document.querySelectorAll('.nav-btn').forEach(function(b){
    b.addEventListener('click',function(){navigate(b.dataset.page);});
});

// Auth
var password=prompt('🔐 Введите пароль администратора:','admin123');
if(password!=='admin123'){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:1.2rem;color:var(--text-secondary);">❌ Доступ запрещён. Обновите страницу.</div>';
} else {
    navigate('dashboard');
}
console.log('👑 FuruGram Admin Panel v24.0');
console.log('📊 Дашборд | 👥 Пользователи | ⭐ Звёзды | 👑 Premium | 📢 Каналы | 👥 Группы | 💬 Сообщения | 🔧 Настройки');
})();
</script>
</body>
</html>
